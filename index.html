window.dayClick=function(dateStr){
  var db=getDB();var sessions=db.sessions.filter(function(s){return s.date===dateStr;}).sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
  var sessHtml=sessions.length===0?'<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><p>Nenhuma sessão neste dia</p></div>':'<div>';
  sessions.forEach(function(s){var sb=statusBadge(s.status);sessHtml+='<div class="ds-item"><div class="ds-bar" style="background:'+catColor(s.category)+'"></div><div style="flex:1"><div style="font-weight:600;font-size:13.5px">'+clientName(s.clientId)+'</div><div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center"><span class="badge '+catBadgeClass(s.category)+'" style="font-size:10px">'+catLabelShort(s.category)+'</span><span style="font-size:12px;color:var(--text2)">'+(s.time||'')+' · '+pkgName(s.packageId)+'</span></div></div><span class="badge '+sb[0]+'" style="flex-shrink:0">'+sb[1]+'</span><button class="btn-icon" onclick="closeModal();showSessionEditForm(\''+s.id+'\')">✏️</button></div>';});
  if(sessions.length>0)sessHtml+='</div>';
  showModal('📅 '+fmtDate(dateStr),sessHtml+'<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:right"><button class="btn btn-primary btn-sm" onclick="closeModal();showSessionForm(null,\''+dateStr+'\')">+ Agendar neste dia</button></div>');
};

// ── FINANCIAL ──
function renderFinancial(){
  var db=getDB();
  var paid=db.packages.filter(function(p){return p.paymentStatus==='paid';});
  var parcela1=db.packages.filter(function(p){return p.paymentStatus==='parcela1';});
  var pending=db.packages.filter(function(p){return p.paymentStatus==='pending';});
  var paidRev=paid.reduce(function(a,p){return a+p.price;},0);
  var parcela1Rev=parcela1.reduce(function(a,p){return a+p.price/2;},0);
  var pendRev=pending.reduce(function(a,p){return a+p.price;},0)+parcela1.reduce(function(a,p){return a+p.price/2;},0);
  var revenueByMonth={};
  paid.forEach(function(p){var d=p.paymentDate||( p.createdAt?p.createdAt.split('T')[0]:null);if(d){var mon=d.slice(0,7);if(!revenueByMonth[mon])revenueByMonth[mon]=0;revenueByMonth[mon]+=p.price;}});
  parcela1.forEach(function(p){if(p.paymentDate){var mon=p.paymentDate.slice(0,7);if(!revenueByMonth[mon])revenueByMonth[mon]=0;revenueByMonth[mon]+=p.price/2;}});
  var sortedMonths=Object.keys(revenueByMonth).sort().reverse();
  var monthRows='';
  sortedMonths.forEach(function(mon){var parts=mon.split('-');var mn=new Date(parseInt(parts[0]),parseInt(parts[1])-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});monthRows+='<tr><td><strong>'+mn.charAt(0).toUpperCase()+mn.slice(1)+'</strong></td><td style="color:var(--green);font-weight:700">'+fmt(revenueByMonth[mon])+'</td></tr>';});
  var pendingRows='';
  parcela1.forEach(function(p){pendingRows+='<tr><td><strong>'+clientName(p.clientId)+'</strong></td><td class="td-muted">'+p.name+'</td><td style="font-weight:600">'+fmt(p.price/2)+'</td><td><span class="badge badge-parcial">🔶 2ª Parcela Pendente</span></td><td style="color:'+(p.paymentDate2&&p.paymentDate2<today()?'var(--red)':'var(--text2)')+'">'+( p.paymentDate2?fmtDate(p.paymentDate2):'—')+'</td><td><button class="btn btn-primary btn-sm" onclick="(async function(){await markPaid(\''+p.id+'\');})()">2ª Parcela Paga</button></td></tr>';});
  pending.forEach(function(p){pendingRows+='<tr><td><strong>'+clientName(p.clientId)+'</strong></td><td class="td-muted">'+p.name+'</td><td style="color:var(--yellow);font-weight:600">'+fmt(p.price)+'</td><td><span class="badge badge-yellow">⏳ Pendente</span></td><td class="td-muted">—</td><td><button class="btn btn-primary btn-sm" onclick="(async function(){await markPaid(\''+p.id+'\');})()">Marcar pago</button></td></tr>';});
  var paidRows='';
  paid.forEach(function(p){var st=pkgStats(p);paidRows+='<tr><td><strong>'+clientName(p.clientId)+'</strong></td><td class="td-muted">'+p.name+'</td><td class="td-muted">'+st.used+'/'+p.totalSessions+'</td><td style="color:var(--green);font-weight:600">'+fmt(p.price)+'</td><td><button class="btn btn-ghost btn-sm" onclick="(async function(){await markPending(\''+p.id+'\');})()">Reverter</button></td></tr>';});
  var html='<div class="page"><div class="grid-4" style="margin-bottom:24px">';
  html+='<div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-val">'+fmt(paidRev)+'</div><div class="stat-label">Pago Integral</div></div>';
  html+='<div class="stat-card" style="border-color:rgba(251,146,60,0.3)"><div class="stat-icon">🔶</div><div class="stat-val" style="font-size:22px">'+fmt(parcela1Rev)+'</div><div class="stat-label">1ª Parcela Recebida</div></div>';
  html+='<div class="stat-card yellow"><div class="stat-icon">⏳</div><div class="stat-val" style="font-size:22px">'+fmt(pendRev)+'</div><div class="stat-label">A Receber</div></div>';
  html+='<div class="stat-card blue"><div class="stat-icon">📊</div><div class="stat-val" style="font-size:20px">'+fmt(paidRev+parcela1Rev+pending.reduce(function(a,p){return a+p.price;},0))+'</div><div class="stat-label">Total em Carteira</div></div>';
  html+='</div>';
  if(sortedMonths.length>0)html+='<div class="card" style="margin-bottom:20px"><div class="section-header"><div class="section-title">📆 Receita por Mês</div></div><div class="table-wrap"><table><thead><tr><th>Mês</th><th>Receita Recebida</th></tr></thead><tbody>'+monthRows+'</tbody></table></div></div>';
  if(parcela1.length>0||pending.length>0)html+='<div class="card" style="margin-bottom:20px"><div class="section-header"><div class="section-title">⏳ Pagamentos Pendentes</div></div><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Pacote</th><th>Valor</th><th>Status</th><th>Data</th><th>Ação</th></tr></thead><tbody>'+pendingRows+'</tbody></table></div></div>';
  html+='<div class="card"><div class="section-header"><div class="section-title">✅ Pagamentos Confirmados</div></div>'+(paid.length===0?'<div class="empty" style="padding:20px"><p>Nenhum pagamento confirmado</p></div>':'<div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Pacote</th><th>Sessões</th><th>Valor</th><th>Ação</th></tr></thead><tbody>'+paidRows+'</tbody></table></div>')+'</div></div>';
  document.getElementById('page-content').innerHTML=html;
}
window.markPaid=async function(id){await dbUpdatePackage(id,{paymentStatus:'paid'});renderFinancial();showToast('✅ Pagamento confirmado!');};
window.markParcela1=async function(id){await dbUpdatePackage(id,{paymentStatus:'parcela1'});renderFinancial();showToast('🔶 1ª parcela registrada!');};
window.markPending=async function(id){await dbUpdatePackage(id,{paymentStatus:'pending'});renderFinancial();showToast('↩️ Revertido para pendente');};

// ── NOTES ──
function renderNotes(){
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('page-content').innerHTML='<div class="page"><div class="card" style="border-color:rgba(245,200,66,0.25)"><div class="section-header"><div class="section-title">📝 Notas Importantes</div><span id="notes-status" style="font-size:12px;color:var(--text2)"></span></div><div id="notes-container" style="color:var(--text2);padding:10px 0">Carregando...</div><div style="margin-top:12px;text-align:right"><button class="btn btn-primary" id="save-notes-btn">💾 Salvar</button></div></div></div>';

  var _noteId=null;

  async function saveNotes(content){
    var status=document.getElementById('notes-status');
    if(status)status.textContent='Salvando...';
    try{
      var res;
      if(_noteId){
        res=await fetch(SUPA_URL+'/rest/v1/notes?id=eq.'+_noteId,{
          method:'PATCH',
          headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({content:content,updated_at:new Date().toISOString()})
        });
      } else {
        _noteId='note_admin';
        res=await fetch(SUPA_URL+'/rest/v1/notes',{
          method:'POST',
          headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
          body:JSON.stringify({id:'note_admin',user_id:'admin',content:content,updated_at:new Date().toISOString()})
        });
      }
      localStorage.setItem('dashboard_notes',content);
      if(status)status.textContent=res.ok?'✅ Salvo!':'⚠️ Erro: '+res.status;
    }catch(e){
      localStorage.setItem('dashboard_notes',content);
      if(status)status.textContent='✅ Salvo localmente';
    }
    setTimeout(function(){var s=document.getElementById('notes-status');if(s)s.textContent='';},3000);
  }

  function buildUI(content){
    var ta=document.createElement('textarea');
    ta.rows=18;
    ta.placeholder='Escreva seus lembretes aqui...';
    ta.style.cssText='width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;outline:none;line-height:1.8;box-sizing:border-box;display:block;';
    ta.value=content||'';
    var container=document.getElementById('notes-container');
    if(container){container.innerHTML='';container.appendChild(ta);}
    var btn=document.getElementById('save-notes-btn');
    if(btn)btn.onclick=function(){saveNotes(ta.value);};
  }

  // Try to load from Supabase using fixed ID 'note_admin'
  fetch(SUPA_URL+'/rest/v1/notes?id=eq.note_admin',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(rows&&rows.length>0){
      _noteId='note_admin';
      buildUI(rows[0].content||'');
    } else {
      buildUI(localStorage.getItem('dashboard_notes')||'');
    }
  }).catch(function(){
    buildUI(localStorage.getItem('dashboard_notes')||'');
  });
}

function saveSettings(){
  var creds=getCreds();
  var name=document.getElementById('st-name').value.trim();
  var email=document.getElementById('st-email').value.trim();
  var current=document.getElementById('st-current').value;
  var np=document.getElementById('st-new').value;
  var nc=document.getElementById('st-confirm').value;
  var err=document.getElementById('st-error');var ok=document.getElementById('st-ok');
  err.style.display='none';ok.style.display='none';
  if(!name||!email){err.textContent='Nome e email obrigatórios';err.style.display='flex';return;}
  if(!current){err.textContent='Digite a senha atual';err.style.display='flex';return;}
  if(current!==creds.password){err.textContent='Senha atual incorreta';err.style.display='flex';return;}
  if(np&&np!==nc){err.textContent='Senhas não coincidem';err.style.display='flex';return;}
  if(np&&np.length<4){err.textContent='Mínimo 4 caracteres';err.style.display='flex';return;}
  creds.name=name;creds.email=email;if(np)creds.password=np;
  saveCreds(creds);document.getElementById('sidebar-user-name').textContent=name;
  ok.textContent='✅ Salvo!';ok.style.display='flex';
  document.getElementById('st-current').value='';document.getElementById('st-new').value='';document.getElementById('st-confirm').value='';
}

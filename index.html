<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuroPsi</title>
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--text2:#9099b0;--text3:#5a6278;--green:#34d98a;--green-bg:rgba(52,217,138,0.10);--green-bg2:rgba(52,217,138,0.18);--red:#f06060;--red-bg:rgba(240,96,96,0.12);--yellow:#f5c842;--yellow-bg:rgba(245,200,66,0.12);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12);--radius:14px;--radius-sm:9px;--shadow:0 4px 32px rgba(0,0,0,0.4);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;letter-spacing:-0.02em;font-weight:600;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:99px;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{width:56px;height:56px;background:var(--green-bg2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;}
.login-logo h1{font-size:24px;font-weight:700;letter-spacing:-0.03em;}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px;}
.login-hint{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--text2);}
.login-hint strong{color:var(--green);}
#app{display:flex;min-height:100vh;}
.sidebar{width:230px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.25s;}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h2{font-size:15px;font-weight:700;}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;}
.nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--green-bg2);color:var(--green);}
.nav-item .ico{font-size:17px;width:22px;text-align:center;}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border);}
.main{margin-left:230px;flex:1;min-height:100vh;padding:28px 32px;}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:700;flex:1;letter-spacing:-0.03em;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-icon{font-size:22px;margin-bottom:10px;}
.stat-val{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;font-size:28px;font-weight:700;line-height:1;letter-spacing:-0.04em;}
.stat-label{font-size:11px;color:var(--text2);margin-top:6px;letter-spacing:0.02em;font-weight:500;}
.stat-card.green{border-color:rgba(52,217,138,0.2);background:linear-gradient(135deg,var(--bg2) 60%,rgba(52,217,138,0.04));}
.stat-card.yellow{border-color:rgba(245,200,66,0.2);}
.stat-card.blue{border-color:rgba(96,165,250,0.2);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:11px 16px;border-bottom:1px solid var(--border);}
td{padding:12px 16px;font-size:13.5px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.5;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.td-muted{color:var(--text2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,200,66,0.25);}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,0.25);}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,0.25);}
.badge-agendada{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,0.25);}
.badge-realizada{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.badge-falta{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.badge-parcial{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3);}
.badge-psico{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,0.25);}
.badge-reab{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,0.25);}
.badge-aval{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:inherit;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--green);color:#0a1a12;}
.btn-primary:hover{background:#3ee99a;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{background:#252b3b;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-icon{padding:7px;border-radius:var(--radius-sm);background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;font-size:15px;transition:all 0.15s;}
.btn-icon:hover{background:#252b3b;color:var(--text);}
.form-group{margin-bottom:16px;}
label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border-color 0.15s;line-height:1.5;}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(52,217,138,0.1);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--bg3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.15s ease;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:slideUp 0.2s ease;}
.modal-lg{max-width:700px;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:17px;font-weight:700;letter-spacing:-0.02em;}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;}
.modal-close:hover{background:var(--bg3);color:var(--text);}
.modal-body{padding:24px;}
.progress-bar{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.progress-green{background:var(--green);}
.progress-yellow{background:var(--yellow);}
.progress-red{background:var(--red);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.client-avatar{width:54px;height:54px;border-radius:14px;background:var(--green-bg2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--green);flex-shrink:0;}
.package-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.package-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.alert{padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.alert-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.alert-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,200,66,0.25);}
.empty{text-align:center;padding:52px 20px;color:var(--text2);}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:0.4;}
.search-input-wrap{position:relative;flex:1;}
.search-input-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);}
.cal-toolbar-left{display:flex;align-items:center;gap:8px;}
.cal-toolbar-title{font-size:20px;font-weight:700;min-width:200px;letter-spacing:-0.03em;}
.cal-view-btns{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;}
.cal-view-btn{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all 0.15s;font-family:inherit;}
.cal-view-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 13px;cursor:pointer;font-size:15px;transition:background 0.15s;}
.cal-nav-btn:hover{background:#252b3b;}
.cal-today-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 13px;cursor:pointer;font-size:12px;font-weight:600;transition:background 0.15s;font-family:inherit;}
.cal-today-btn:hover{background:#252b3b;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.month-header{text-align:center;padding:12px 4px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);}
.month-day{min-height:180px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
.month-day:nth-child(7n){border-right:none;}
.month-day:hover{background:rgba(255,255,255,0.02);}
.month-day.other{opacity:0.35;}
.month-day.today{background:rgba(52,217,138,0.05);}
.month-day-num{font-size:13px;font-weight:600;color:var(--text2);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:4px;}
.month-day.today .month-day-num{background:var(--green);color:#0a1a12;font-weight:700;}
.cal-chip{border-radius:5px;padding:2px 6px;font-size:10.5px;font-weight:500;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;transition:opacity 0.1s;line-height:1.35;}
.cal-chip:hover{opacity:0.8;}
.cal-chip.psicoterapia{background:rgba(96,165,250,0.22);color:#93c5fd;border-left:2px solid var(--blue);}
.cal-chip.reabilitacao{background:rgba(167,139,250,0.22);color:#c4b5fd;border-left:2px solid var(--purple);}
.cal-chip.avaliacao{background:rgba(52,217,138,0.18);color:#6ee7b7;border-left:2px solid var(--green);}
.cal-chip.falta{background:rgba(240,96,96,0.18);color:#fca5a5;border-left:2px solid var(--red);text-decoration:line-through;}
.cal-chip.realizada{opacity:0.55;}
.cal-more{font-size:10px;color:var(--text3);padding:1px 6px;cursor:pointer;}
.week-wrap{display:flex;overflow:hidden;}
.week-time-col{width:52px;flex-shrink:0;border-right:1px solid var(--border);}
.week-time-cell{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:11px;color:var(--text3);}
.week-days{flex:1;display:grid;}
.week-day-header{text-align:center;padding:14px 4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.week-day-header:last-child{border-right:none;}
.week-day-name{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.week-day-num{font-size:20px;font-weight:300;color:var(--text);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:4px auto 0;}
.week-day-header.today .week-day-num{background:var(--green);color:#0a1a12;}
.week-cell{height:64px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;cursor:pointer;transition:background 0.1s;}
.week-cell:last-child{border-right:none;}
.week-cell:hover{background:rgba(255,255,255,0.02);}
.week-event{border-radius:5px;padding:3px 7px;font-size:10.5px;font-weight:500;cursor:pointer;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;line-height:1.35;}
.week-event.psicoterapia{background:rgba(96,165,250,0.25);color:#93c5fd;border-left:2px solid var(--blue);}
.week-event.reabilitacao{background:rgba(167,139,250,0.25);color:#c4b5fd;border-left:2px solid var(--purple);}
.week-event.avaliacao{background:rgba(52,217,138,0.2);color:#6ee7b7;border-left:2px solid var(--green);}
.week-event.falta{background:rgba(240,96,96,0.2);color:#fca5a5;border-left:2px solid var(--red);}
.ds-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.ds-item:last-child{border-bottom:none;}
.ds-bar{width:3px;height:36px;border-radius:99px;flex-shrink:0;}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;padding:16px;}.grid-4{grid-template-columns:1fr 1fr;}.grid-2,.grid-3{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}.hamburger{display:block;}.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:none;}.sidebar-overlay.open{display:block;}.month-day{min-height:70px;}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeIn 0.2s ease;}
</style>

<script>
const SUPA_URL='https://zrjrzorspfnohjzzykog.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyanJ6b3JzcGZub2hqenp5a29nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTA4NTIsImV4cCI6MjA5MTY2Njg1Mn0.Y8vDMSqzV9IosWMltnA8j5zTZYRXB_OjUsIhdSdq-HI';
const AUTH_KEY='consultorio_auth';
const CREDS_KEY='consultorio_creds';
let _cache=null;
let _idCounter=0;

function genId(){_idCounter++;return Date.now().toString(36)+'_'+_idCounter.toString(36)+'_'+Math.random().toString(36).slice(2,8);}
function today(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y;}
function fmtDateTime(d,t){return t?fmtDate(d)+' às '+t:fmtDate(d);}
function getInitials(name){if(!name)return'?';return name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();}

function getCreds(){const raw=localStorage.getItem(CREDS_KEY);if(raw)return JSON.parse(raw);return{email:'admin@admin.com',password:'1234',name:'Profissional'};}
function saveCreds(c){localStorage.setItem(CREDS_KEY,JSON.stringify(c));}
function getDB(){return _cache||{clients:[],packages:[],sessions:[]};}

async function supaFetch(method,table,body,query){
  const url=SUPA_URL+'/rest/v1/'+table+(query||'');
  const headers={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
  if(method==='POST'||method==='PATCH')headers['Prefer']='return=representation';
  const opts={method:method,headers:headers};
  if(body!=null)opts.body=JSON.stringify(body);
  try{
    const res=await fetch(url,opts);
    const text=await res.text();
    if(!res.ok){console.error('DB Error',res.status,text);return null;}
    return text?JSON.parse(text):[];
  }catch(err){console.error('Network error:',err.message);return null;}
}

function showLoadingOverlay(show){
  let el=document.getElementById('loading-overlay');
  if(show&&!el){el=document.createElement('div');el.id='loading-overlay';el.style.cssText='position:fixed;inset:0;background:rgba(15,17,23,0.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="text-align:center"><div style="font-size:28px;margin-bottom:12px">🔄</div><div style="color:var(--text2);font-size:14px">Sincronizando...</div></div>';document.body.appendChild(el);}
  else if(!show&&el){el.remove();}
}

async function loadFromSupabase(){
  showLoadingOverlay(true);
  try{
    const [clients,packages,sessions]=await Promise.all([
      supaFetch('GET','clients',null,'?order=name'),
      supaFetch('GET','packages',null,'?order=created_at'),
      supaFetch('GET','sessions',null,'?order=date')
    ]);
    _cache={
      clients:(clients||[]).map(function(c){return Object.assign({},c,{cpf:c.cpf||'',birthDate:c.birth_date||null,education:c.education||'',address:c.address||''});}),
      packages:(packages||[]).map(function(p){return Object.assign({},p,{clientId:p.client_id,totalSessions:p.total_sessions,paymentStatus:p.payment_status,createdAt:p.created_at,notes:p.notes||'',paymentDate:p.payment_date||null,paymentDate2:p.payment_date2||null,paymentType:p.payment_type||'pacote'});}),
      sessions:(sessions||[]).map(function(s){return Object.assign({},s,{clientId:s.client_id,packageId:s.package_id,intervalDays:s.interval_days,createdAt:s.created_at,sessionPaid:s.session_paid||false,sessionPayStatus:s.session_pay_status||'pending'});})
    };
  }catch(e){console.error('Load error:',e);_cache=_cache||{clients:[],packages:[],sessions:[]};showToast('⚠️ Erro ao carregar dados.',true);}
  showLoadingOverlay(false);
  return _cache;
}

// ── CRUD ──
async function dbAddClient(data){const row=Object.assign({id:genId(),created_at:new Date().toISOString()},data);await supaFetch('POST','clients',row);await loadFromSupabase();return row;}
async function dbUpdateClient(id,data){await supaFetch('PATCH','clients',data,'?id=eq.'+id);await loadFromSupabase();}
async function dbDeleteClient(id){await supaFetch('DELETE','clients',null,'?id=eq.'+id);await loadFromSupabase();}

async function dbUpdatePackage(id,data){
  var row={};
  if(data.name)row.name=data.name;
  if(data.totalSessions)row.total_sessions=data.totalSessions;
  if(data.price!==undefined)row.price=data.price;
  if(data.paymentStatus)row.payment_status=data.paymentStatus;
  if(data.clientId)row.client_id=data.clientId;
  if(data.notes!==undefined)row.notes=data.notes;
  if(data.paymentDate!==undefined)row.payment_date=data.paymentDate||null;
  if(data.paymentDate2!==undefined)row.payment_date2=data.paymentDate2||null;
  if(data.paymentType!==undefined)row.payment_type=data.paymentType;
  await supaFetch('PATCH','packages',row,'?id=eq.'+id);
  if(data.newTime){await supaFetch('PATCH','sessions',{time:data.newTime},'?package_id=eq.'+id+'&date=gte.'+today()+'&status=eq.agendada');}
  await loadFromSupabase();
}
async function dbDeletePackage(id){await supaFetch('DELETE','packages',null,'?id=eq.'+id);await loadFromSupabase();}

async function dbAddSession(data){
  var row={id:genId(),client_id:data.clientId,package_id:data.packageId,date:data.date,time:data.time||null,status:data.status||'agendada',category:data.category||'psicoterapia',notes:data.notes||null,interval_days:data.intervalDays||null,created_at:new Date().toISOString()};
  await supaFetch('POST','sessions',row);await loadFromSupabase();return row;
}
async function dbUpdateSession(id,data){
  var row={};
  if(data.date)row.date=data.date;
  if(data.time!==undefined)row.time=data.time;
  if(data.status)row.status=data.status;
  if(data.notes!==undefined)row.notes=data.notes;
  if(data.category)row.category=data.category;
  if(data.sessionPaid!==undefined)row.session_paid=data.sessionPaid;
  if(data.sessionPayStatus!==undefined)row.session_pay_status=data.sessionPayStatus;
  await supaFetch('PATCH','sessions',row,'?id=eq.'+id);await loadFromSupabase();
}
async function dbDeleteSession(id){await supaFetch('DELETE','sessions',null,'?id=eq.'+id);await loadFromSupabase();}
async function dbUpdateSessionsBatch(updates){await Promise.all(updates.map(function(u){return supaFetch('PATCH','sessions',u.data,'?id=eq.'+u.id);}));await loadFromSupabase();}

// ── AUTH ──
function doLogin(){
  var email=document.getElementById('login-email').value.trim();
  var pass=document.getElementById('login-pass').value;
  var creds=getCreds();
  var err=document.getElementById('login-error');
  if(email===creds.email&&pass===creds.password){
    localStorage.setItem(AUTH_KEY,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sidebar-user-name').textContent=creds.name;
    err.style.display='none';
    navigate('dashboard');
    setTimeout(function(){loadFromSupabase().then(function(){navigate('dashboard');}).catch(function(){});},200);
  }else{err.style.display='flex';}
}
function doLogout(){localStorage.removeItem(AUTH_KEY);document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}
document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

// ── NAVIGATION ──
var currentPage='dashboard';
function navigate(page){
  currentPage=page;closeSidebar();
  var main=document.querySelector('.main');

// ── HELPERS ──
function paymentBadgeClass(s){if(s==='paid')return'badge-green';if(s==='parcela1')return'badge-parcial';return'badge-yellow';}
function paymentLabel(s,t){if(s==='paid'&&t==='sessao')return'💳 Por Sessão';if(s==='paid')return'💰 Pago';if(s==='parcela1')return'🔶 1ª Parcela';return'⏳ Pendente';}
function catColor(cat){if(!cat||cat==='psicoterapia')return'var(--blue)';if(cat==='reabilitacao')return'var(--purple)';if(cat==='avaliacao')return'var(--green)';return'var(--blue)';}
function catBadgeClass(cat){if(!cat||cat==='psicoterapia')return'badge-psico';if(cat==='reabilitacao')return'badge-reab';if(cat==='avaliacao')return'badge-aval';return'badge-blue';}
function catLabelShort(cat){if(!cat||cat==='psicoterapia')return'Psicoterapia';if(cat==='reabilitacao')return'Reabilitação';if(cat==='avaliacao')return'Avaliação';return cat||'—';}
function statusBadge(s){if(s==='realizada'||s==='completed')return['badge-realizada','✅ Realizada'];if(s==='falta')return['badge-falta','❌ Falta'];return['badge-agendada','📅 Agendada'];}
function pkgStats(pkg){var db=getDB();var used=db.sessions.filter(function(s){return s.packageId===pkg.id&&(s.status==='realizada'||s.status==='completed');}).length;var total=db.sessions.filter(function(s){return s.packageId===pkg.id;}).length;return{used:used,remaining:pkg.totalSessions-used,totalRegistered:total,isExhausted:(pkg.totalSessions-used)<=0,canAdd:total<pkg.totalSessions,pct:Math.round((used/pkg.totalSessions)*100)};}
function clientName(id){var c=getDB().clients.find(function(c){return c.id===id;});return c?c.name:'—';}
function pkgName(id){var p=getDB().packages.find(function(p){return p.id===id;});return p?p.name:'—';}

// ── BACKUP ──
function exportBackup(){var blob=new Blob([JSON.stringify(getDB(),null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='consultorio-backup-'+today()+'.json';a.click();}
function importBackup(){document.getElementById('import-file').click();}
function loadBackupFile(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.clients||!data.packages||!data.sessions)throw new Error();
      showToast('⏳ Restaurando...');
      for(var i=0;i<data.clients.length;i++){var c=data.clients[i];await supaFetch('POST','clients',{id:c.id,name:c.name,phone:c.phone||null,email:c.email||null,notes:c.notes||null,created_at:c.createdAt||new Date().toISOString()});}
      for(var i=0;i<data.packages.length;i++){var p=data.packages[i];await supaFetch('POST','packages',{id:p.id,client_id:p.clientId,name:p.name,total_sessions:p.totalSessions,price:p.price,payment_status:p.paymentStatus||'pending',created_at:p.createdAt||new Date().toISOString()});}
      for(var i=0;i<data.sessions.length;i++){var s=data.sessions[i];var st=s.status==='completed'?'realizada':s.status==='pending'?'agendada':s.status||'agendada';await supaFetch('POST','sessions',{id:s.id,client_id:s.clientId,package_id:s.packageId,date:s.date,time:s.time||null,status:st,category:s.category||'psicoterapia',notes:s.notes||null,interval_days:s.intervalDays||null,created_at:s.createdAt||new Date().toISOString()});}
      await loadFromSupabase();navigate(currentPage);showToast('✅ Backup restaurado!');
    }catch(err){console.error(err);showToast('❌ Arquivo inválido',true);}
  };
  reader.readAsText(file);e.target.value='';
}

function renderDashboard(){
  var db=getDB();
  if(!db.clients.length&&!db.packages.length){
    document.getElementById('page-content').innerHTML='<div class="page"><div class="card" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:16px">🔄</div><p style="color:var(--text2);margin-bottom:20px">Carregando dados...</p><button class="btn btn-primary" onclick="loadFromSupabase().then(function(){renderDashboard();})">Recarregar</button></div></div>';
    loadFromSupabase().then(function(){var db2=getDB();if(db2.clients.length||db2.packages.length)renderDashboard();});
    return;
  }
  var totalClients=db.clients.length;
  var totalDone=db.sessions.filter(function(s){return s.status==='realizada'||s.status==='completed';}).length;
  var paidRev=db.packages.filter(function(p){return p.paymentStatus==='paid';}).reduce(function(a,p){return a+p.price;},0)+db.packages.filter(function(p){return p.paymentStatus==='parcela1';}).reduce(function(a,p){return a+p.price/2;},0);
  var pendRev=db.packages.filter(function(p){return p.paymentStatus==='pending';}).reduce(function(a,p){return a+p.price;},0)+db.packages.filter(function(p){return p.paymentStatus==='parcela1';}).reduce(function(a,p){return a+p.price/2;},0);
  var now=today();
  var in7=new Date();in7.setDate(in7.getDate()+7);
  var in7s=in7.toISOString().split('T')[0];

  // Proximas 7 dias
  var upcoming=db.sessions.filter(function(s){return s.status==='agendada'&&s.date>=now&&s.date<=in7s;}).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,6);
  var upcomingHtml='';
  if(upcoming.length===0){
    upcomingHtml='<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><p>Nenhuma sessão nos próximos 7 dias</p></div>';
  } else {
    upcoming.forEach(function(s){upcomingHtml+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="width:3px;height:36px;border-radius:99px;background:'+catColor(s.category)+';flex-shrink:0"></div><div style="flex:1"><div style="font-size:13.5px;font-weight:600">'+clientName(s.clientId)+'</div><div style="font-size:12px;color:var(--text2)">'+fmtDateTime(s.date,s.time)+' · <span style="color:'+catColor(s.category)+'">'+catLabelShort(s.category)+'</span></div></div></div>';});
  }

  // Pacotes a encerrar (1 ou 2 sessoes restantes)
  var expiringHtml='';
  var expiringCount=0;
  db.packages.forEach(function(p){
    var st=pkgStats(p);
    if(!st.isExhausted&&st.remaining<=2&&st.remaining>0){
      expiringCount++;
      expiringHtml+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:13.5px;font-weight:600">'+clientName(p.clientId)+'</div><div style="font-size:12px;color:var(--text2)">'+p.name+' · <span style="color:var(--yellow)">'+st.remaining+' sessão'+(st.remaining!==1?'ões':'')+' restante'+(st.remaining!==1?'s':'')+'</span></div></div><button class="btn btn-ghost btn-sm" onclick="navigate(\'packages\')">Ver →</button></div>';
    }
  });
  if(expiringCount===0)expiringHtml='<div class="empty" style="padding:24px"><div class="empty-icon">✅</div><p>Nenhum pacote encerrando em breve</p></div>';

  // Notas
  var savedNotes=localStorage.getItem('dashboard_notes')||'';
  var notesPreview=savedNotes.trim();
  var hasNotes=notesPreview.length>0;

  var html='<div class="page">';
  html+='<div class="grid-4" style="margin-bottom:24px">';
  html+='<div class="stat-card green"><div class="stat-icon">👥</div><div class="stat-val">'+totalClients+'</div><div class="stat-label">Clientes</div></div>';
  html+='<div class="stat-card blue"><div class="stat-icon">✅</div><div class="stat-val">'+totalDone+'</div><div class="stat-label">Sessões Realizadas</div></div>';
  html+='<div class="stat-card '+(hasNotes?'yellow':'')+'" style="cursor:pointer" onclick="navigate(\'notes\')"><div class="stat-icon">📝</div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px">'+(hasNotes?notesPreview.slice(0,55)+(notesPreview.length>55?'...':''):'Clique para abrir notas')+'</div><div class="stat-label">Notas Importantes</div></div>';
  html+='<div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val" style="font-size:20px">'+fmt(paidRev)+'</div><div class="stat-label">Receita Confirmada</div></div>';
  html+='</div>';

  if(pendRev>0)html+='<div class="alert alert-yellow" style="margin-bottom:20px">⚠️ <strong>'+fmt(pendRev)+'</strong> em pagamentos pendentes</div>';
  // Bills alert - load async
  supaFetch('GET','bills',null,'?paid=eq.false&order=due_date').then(function(bills){
    if(!bills||!bills.length)return;
    var now=today();
    var urgent=bills.filter(function(b){
      var diff=Math.round((new Date(b.due_date+'T12:00:00')-new Date(now+'T12:00:00'))/(1000*60*60*24));
      return diff<=3;
    });
    if(urgent.length>0){
      var alertDiv=document.createElement('div');
      alertDiv.className='alert alert-red';
      alertDiv.style.marginBottom='20px';
      alertDiv.style.cursor='pointer';
      alertDiv.onclick=function(){navigate('bills');};
      var labels=urgent.map(function(b){
        var diff=Math.round((new Date(b.due_date+'T12:00:00')-new Date(now+'T12:00:00'))/(1000*60*60*24));
        return b.description+(diff<0?' (vencido)':diff===0?' (hoje)':' ('+diff+'d)');
      }).join(', ');
      alertDiv.innerHTML='📎 <strong>'+urgent.length+' boleto'+(urgent.length!==1?'s':'')+' urgente'+(urgent.length!==1?'s':'')+' → clique para ver:</strong> '+labels;
      var pageContent=document.getElementById('page-content');
      if(pageContent){
        var firstAlert=pageContent.querySelector('.alert');
        if(firstAlert){firstAlert.parentNode.insertBefore(alertDiv,firstAlert);}
        else{var page=pageContent.querySelector('.page');if(page)page.insertBefore(alertDiv,page.firstChild);}
      }
    }
  }).catch(function(){});

  html+='<div class="grid-2">';
  html+='<div class="card"><div class="section-header"><div class="section-title">📅 Próximas 7 dias</div><button class="btn btn-ghost btn-sm" onclick="navigate(\'agenda\')">Ver agenda →</button></div>'+upcomingHtml+'</div>';
  html+='<div class="card"><div class="section-header"><div class="section-title">⚠️ Pacotes a Encerrar</div><button class="btn btn-ghost btn-sm" onclick="navigate(\'packages\')">Ver pacotes →</button></div>'+expiringHtml+'</div>';
  html+='</div>';

  html+='<div class="card" style="margin-top:16px;border-color:rgba(245,200,66,0.25);cursor:pointer" onclick="navigate(\'notes\')"><div style="display:flex;align-items:center;justify-content:space-between"><div><div class="section-title" style="margin-bottom:6px">📝 Notas Importantes</div><div style="font-size:13px;color:var(--text2)">'+(hasNotes?notesPreview.slice(0,120)+(notesPreview.length>120?'...':''):'Nenhuma nota ainda. Clique para adicionar.')+'</div></div><button class="btn btn-ghost btn-sm" style="margin-left:16px;flex-shrink:0">Abrir →</button></div></div>';
  html+='</div>';
  document.getElementById('page-content').innerHTML=html;
}

function showClientDetail(id){
  var db=getDB();var c=db.clients.find(function(c){return c.id===id;});if(!c)return;
  var pkgs=db.packages.filter(function(p){return p.clientId===id;});
  var sessions=db.sessions.filter(function(s){return s.clientId===id;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var pkgsHtml=pkgs.length===0?'<div class="empty" style="padding:20px"><p>Nenhum pacote</p></div>':'';

async function savePackage(id){
  var clientId=document.getElementById('pf-client').value;
  var name=document.getElementById('pf-name').value.trim();
  var totalSessions=parseInt(document.getElementById('pf-sessions').value);
  var price=parseFloat(document.getElementById('pf-price').value);
  var paymentStatus=document.getElementById('pf-payment').value;
  var paymentType=document.getElementById('pf-type').value;
  var paymentDate=document.getElementById('pf-payment-date').value||null;
  var paymentDate2=document.getElementById('pf-payment-date2').value||null;
  var err=document.getElementById('pf-error');
  if(!name||!totalSessions||isNaN(price)){err.textContent='Preencha todos os campos obrigatórios';err.style.display='flex';return;}
  if(totalSessions<1){err.textContent='Sessões deve ser maior que 0';err.style.display='flex';return;}
  if(!id){var fd=document.getElementById('pf-first-date')?document.getElementById('pf-first-date').value:'';if(!fd){err.textContent='Informe a data da 1ª sessão';err.style.display='flex';return;}}
  var firstDate=document.getElementById('pf-first-date')?document.getElementById('pf-first-date').value||'':'';
  var time=document.getElementById('pf-time')?document.getElementById('pf-time').value||'09:00':'09:00';
  var interval=document.getElementById('pf-interval')?parseInt(document.getElementById('pf-interval').value)||7:7;
  var category=document.getElementById('pf-category')?document.getElementById('pf-category').value||'psicoterapia':'psicoterapia';
  var finalStatus=paymentType==='sessao'?'paid':paymentStatus;
  closeModal();
  if(id){
    var db=getDB();var st=pkgStats(db.packages.find(function(p){return p.id===id;}));
    if(totalSessions<st.used){showToast('Não pode reduzir abaixo das já realizadas',true);return;}
    var editTime=document.getElementById('pf-edit-time')?document.getElementById('pf-edit-time').value:null;
    var propagateTime=document.getElementById('pf-propagate-time')?document.getElementById('pf-propagate-time').checked:false;
    var pkgNotes=document.getElementById('pf-pkg-notes')?document.getElementById('pf-pkg-notes').value||'':'';
    await dbUpdatePackage(id,{clientId:clientId,name:name,totalSessions:totalSessions,price:price,paymentStatus:finalStatus,notes:pkgNotes,paymentDate:paymentDate,paymentDate2:paymentDate2,paymentType:paymentType,newTime:propagateTime&&editTime?editTime:null});
    showToast(propagateTime?'✅ Pacote e horários atualizados!':'✅ Pacote atualizado!');
    renderPackages();return;
  }
  showToast('⏳ Criando pacote e sessões...');
  var pkgId=genId();
  var pkgRes=await fetch(SUPA_URL+'/rest/v1/packages',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({id:pkgId,client_id:clientId,name:name,total_sessions:totalSessions,price:price,payment_status:finalStatus,payment_type:paymentType,payment_date:paymentDate,payment_date2:paymentDate2,created_at:new Date().toISOString()})});
  if(!pkgRes.ok){showToast('❌ Erro ao criar pacote.',true);return;}
  var successCount=0;
  for(var i=0;i<totalSessions;i++){
    var d=new Date(firstDate+'T12:00:00');d.setDate(d.getDate()+(i*interval));
    var sessRes=await fetch(SUPA_URL+'/rest/v1/sessions',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({id:pkgId+'_s'+(i+1),client_id:clientId,package_id:pkgId,date:d.toISOString().split('T')[0],time:time,status:'agendada',category:category,notes:'',interval_days:interval,created_at:new Date(Date.now()+i*10).toISOString()})});
    if(sessRes.ok)successCount++;
  }
  await loadFromSupabase();renderPackages();
  showToast(successCount===totalSessions?'✅ Pacote criado com '+totalSessions+' sessões!':'⚠️ '+successCount+'/'+totalSessions+' sessões criadas.',successCount!==totalSessions);
}

async function cyclePayment(id){var db=getDB();var pkg=db.packages.find(function(p){return p.id===id;});var cycle={pending:'parcela1',parcela1:'paid',paid:'pending'};var newStatus=cycle[pkg.paymentStatus]||'parcela1';await dbUpdatePackage(id,{paymentStatus:newStatus});renderPackages();showToast('✅ '+paymentLabel(newStatus));}
function deletePackageConfirm(id){var p=getDB().packages.find(function(p){return p.id===id;});showModal('Excluir Pacote','<div class="alert alert-red">⚠️ Excluir <strong>'+p.name+'</strong> e todas as sessões?</div><div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="(async function(){closeModal();await dbDeletePackage(\''+id+'\');renderPackages();showToast(\'🗑️ Pacote excluído\');})()">Excluir</button></div>');}

function renderSessions(){
  var db=getDB();
  document.getElementById('topbar-actions').innerHTML='<button class="btn btn-primary" onclick="showSessionForm()">+ Nova Sessão</button>';
  var byClient={};
  db.sessions.forEach(function(s){if(!byClient[s.clientId])byClient[s.clientId]=[];byClient[s.clientId].push(s);});
  Object.values(byClient).forEach(function(arr){arr.sort(function(a,b){return a.date.localeCompare(b.date);});});
  var clientIds=Object.keys(byClient).sort(function(a,b){return clientName(a).localeCompare(clientName(b));});
  if(clientIds.length===0){document.getElementById('page-content').innerHTML='<div class="page"><div class="card"><div class="empty"><div class="empty-icon">📅</div><p>Nenhuma sessão registrada</p><small>Crie um pacote para gerar sessões automaticamente</small></div></div></div>';return;}
  var html='<div class="page">';
  clientIds.forEach(function(clientId){
    var sessions=byClient[clientId];
    var completedCount=sessions.filter(function(s){return s.status==='realizada'||s.status==='completed';}).length;
    var faltaCount=sessions.filter(function(s){return s.status==='falta';}).length;
    var rows='';
    sessions.forEach(function(s){
      var sb=statusBadge(s.status);
      var pkgSessions=db.sessions.filter(function(ss){return ss.packageId===s.packageId;}).sort(function(a,b){return a.date.localeCompare(b.date);});
      var sessNum=pkgSessions.findIndex(function(ss){return ss.id===s.id;})+1;
      var pkg=db.packages.find(function(p){return p.id===s.packageId;});
      var total=pkg?pkg.totalSessions:'?';
      var isStandalone=!s.packageId;
      var isPerSession=pkg&&pkg.paymentType==='sessao';
      var needsIndividualPay=isStandalone||isPerSession;
      var payStatus='pending';
      if(needsIndividualPay){
        // Standalone or per-session: use session's own payment status
        payStatus=s.sessionPayStatus||'pending';
      } else if(pkg){
        // Package payment: mirror from package
        payStatus=pkg.paymentStatus||'pending';
      }
      var payBadge=payStatus==='paid'?'badge-green':payStatus==='parcela1'?'badge-parcial':'badge-yellow';

async function saveSession(){
  var clientId=document.getElementById('sf-client').value;var packageId=document.getElementById('sf-package').value||null;var date=document.getElementById('sf-date').value;var time=document.getElementById('sf-time').value;var status=document.getElementById('sf-status').value;var notes=document.getElementById('sf-notes').value.trim();var category=document.getElementById('sf-category').value;
  var err=document.getElementById('sf-error');
  if(!clientId||!date){err.textContent='Cliente e data são obrigatórios';err.style.display='flex';return;}
  var db=getDB();
  if(packageId){
    var pkg=db.packages.find(function(p){return p.id===packageId;});var st=pkgStats(pkg);
    if(!st.canAdd){err.textContent='Pacote esgotado!';err.style.display='flex';return;}
  }
  if(time&&date){var conflict=db.sessions.find(function(s){return s.date===date&&s.time===time&&s.clientId!==clientId;});if(conflict&&!window.confirm('⚠️ Já existe atendimento com '+clientName(conflict.clientId)+' às '+time+' do dia '+fmtDate(date)+'. Agendar mesmo assim?'))return;}
  // Handle standalone session payment
  var standalonePrice=null;var standalonePayStatus=null;
  if(!packageId){
    standalonePrice=parseFloat(document.getElementById('sf-price').value)||null;
    standalonePayStatus=document.getElementById('sf-pay-status').value;
  }
  closeModal();
  var sessData={clientId:clientId,packageId:packageId,date:date,time:time,status:status,notes:notes,category:category};
  if(standalonePrice!==null)sessData.standalonePrice=standalonePrice;
  if(standalonePayStatus)sessData.standalonePayStatus=standalonePayStatus;
  await dbAddSession(sessData);
  if(currentPage==='sessions')renderSessions();else if(currentPage==='agenda')renderCalendar();
  showToast('✅ Sessão registrada!');
}

async function saveSessionEdit(id){
  var date=document.getElementById('se-date').value;var time=document.getElementById('se-time').value;var status=document.getElementById('se-status').value;var notes=document.getElementById('se-notes').value.trim();var category=document.getElementById('se-cat').value;

  var err=document.getElementById('se-error');
  if(!date){err.textContent='Data é obrigatória';err.style.display='flex';return;}
  var db=getDB();var s=db.sessions.find(function(ss){return ss.id===id;});
  if(status==='falta'&&s&&s.status!=='falta'&&!window.confirm('Confirmar falta para esta sessão?'))return;
  var conflict=db.sessions.find(function(ss){return ss.date===date&&ss.time===time&&ss.clientId!==s.clientId&&ss.id!==id;});
  if(conflict&&!window.confirm('⚠️ Conflito com '+clientName(conflict.clientId)+' às '+time+' do dia '+fmtDate(date)+'. Reagendar mesmo assim?'))return;
  closeModal();
  await dbUpdateSession(id,{date:date,time:time,status:status,notes:notes,category:category});
  if(propagate&&s&&date!==s.date){
    var diff=(new Date(date+'T12:00:00')-new Date(s.date+'T12:00:00'))/(1000*60*60*24);
    var futures=db.sessions.filter(function(ss){return ss.packageId===s.packageId&&ss.date>s.date&&ss.id!==id;}).sort(function(a,b){return a.date.localeCompare(b.date);});
    if(futures.length>0){await dbUpdateSessionsBatch(futures.map(function(ss){var nd=new Date(ss.date+'T12:00:00');nd.setDate(nd.getDate()+diff);return{id:ss.id,data:{date:nd.toISOString().split('T')[0],time:time}};}));}
  }
  if(currentPage==='sessions')renderSessions();else if(currentPage==='agenda')renderCalendar();
  showToast(propagate?'✅ Sessão e futuras atualizadas!':'✅ Sessão atualizada!');
}

var calView='month',calDate=new Date();

function renderCalendar(){
  var db=getDB();var todayStr=today();

  else{var mon=weekStart(calDate);var sun=new Date(mon);sun.setDate(sun.getDate()+6);title=fmtDate(mon.toISOString().split('T')[0])+' – '+fmtDate(sun.toISOString().split('T')[0]);}

function weekStart(d){var dt=new Date(d);var day=dt.getDay();var diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);dt.setHours(0,0,0,0);return dt;}
function buildMonthGrid(db,todayStr){
  var year=calDate.getFullYear(),month=calDate.getMonth();
  var first=new Date(year,month,1);var last=new Date(year,month+1,0);
  var startDow=first.getDay();startDow=startDow===0?6:startDow-1;
  var days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  var html='<div class="month-grid">';
  days.forEach(function(d){html+='<div class="month-header">'+d+'</div>';});
  for(var i=0;i<startDow;i++){html+=buildMonthDay(new Date(year,month,1-startDow+i),db,todayStr,true);}
  for(var d=1;d<=last.getDate();d++)html+=buildMonthDay(new Date(year,month,d),db,todayStr,false);
  var total=startDow+last.getDate();var rem=total%7===0?0:7-(total%7);
  for(var i=1;i<=rem;i++)html+=buildMonthDay(new Date(year,month+1,i),db,todayStr,true);
  return html+'</div>';
}
function buildMonthDay(dt,db,todayStr,other){
  var ds=dt.toISOString().split('T')[0];var isToday=ds===todayStr;
  var sessions=db.sessions.filter(function(s){return s.date===ds;}).sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
  var show=sessions.slice(0,8);var extra=sessions.length-8;
  var chips='';
  show.forEach(function(s){
    var pkg=db.packages.find(function(p){return p.id===s.packageId;});
    var pkgSessions=pkg?db.sessions.filter(function(ss){return ss.packageId===s.packageId;}).sort(function(a,b){return a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'');}):[];
    var sessNum=pkgSessions.findIndex(function(ss){return ss.id===s.id;})+1;
    var total=pkg?pkg.totalSessions:0;
    var parts=clientName(s.clientId).split(' ');
    var shortName=parts.length>=2?parts[0]+' '+parts[1]:parts[0];
    var label=pkg?shortName+' '+sessNum+'/'+total:shortName;
    var chipClass=(s.category||'psicoterapia')+(s.status==='falta'?' falta':s.status==='realizada'?' realizada':'');
    chips+='<span class="cal-chip '+chipClass+'" title="'+clientName(s.clientId)+' — Sessão '+sessNum+'/'+total+'" onclick="event.stopPropagation();showSessionEditForm(\''+s.id+'\')">'+(s.time?'<strong>'+s.time.slice(0,5)+'</strong> ':'')+label+'</span>';
  });
  if(extra>0)chips+='<div class="cal-more">+'+extra+' mais</div>';
  return'<div class="month-day '+(other?'other':'')+' '+(isToday?'today':'')+'" onclick="dayClick(\''+ds+'\')"><div class="month-day-num">'+dt.getDate()+'</div>'+chips+'</div>';
}
function buildWeekGrid(db,todayStr){
  var mon=weekStart(calDate);var weekDays=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(d.getDate()+i);weekDays.push(d);}
  var dayNames=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];var hours=[];for(var h=7;h<=21;h++)hours.push(h);
  var html='<div style="overflow-x:auto"><div style="min-width:600px"><div style="display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid var(--border)"><div style="border-right:1px solid var(--border)"></div>';
  weekDays.forEach(function(d,i){var ds=d.toISOString().split('T')[0];var isToday=ds===todayStr;html+='<div class="week-day-header '+(isToday?'today':'')+'"><div class="week-day-name">'+dayNames[i]+'</div><div class="week-day-num">'+d.getDate()+'</div></div>';});
  html+='</div><div class="week-wrap"><div class="week-time-col">';
  hours.forEach(function(h){html+='<div class="week-time-cell">'+h+':00</div>';});
  html+='</div><div class="week-days" style="grid-template-columns:repeat(7,1fr)">';
  weekDays.forEach(function(d){
    var ds=d.toISOString().split('T')[0];html+='<div style="grid-row:span '+hours.length+'">';
    hours.forEach(function(h){
      var hStr=String(h).padStart(2,'0');
      var sessions=db.sessions.filter(function(s){return s.date===ds&&(s.time||'').startsWith(hStr);});
      var evts='';
      sessions.forEach(function(s){
        var pkg=db.packages.find(function(p){return p.id===s.packageId;});
        var pkgSessions=pkg?db.sessions.filter(function(ss){return ss.packageId===s.packageId;}).sort(function(a,b){return a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'');}):[];
        var n=pkgSessions.findIndex(function(ss){return ss.id===s.id;})+1;var t=pkg?pkg.totalSessions:0;
        var parts=clientName(s.clientId).split(' ');var fn=parts.length>=2?parts[0]+' '+parts[1]:parts[0];
        var lbl=pkg?fn+' '+n+'/'+t:fn;
        evts+='<span class="week-event '+(s.category||'psicoterapia')+(s.status==='falta'?' falta':'')+'" onclick="event.stopPropagation();showSessionEditForm(\''+s.id+'\')">'+lbl+'</span>';
      });
      html+='<div class="week-cell" onclick="dayClick(\''+ds+'\')">'+evts+'</div>';
    });
    html+='</div>';
  });
  html+='</div></div></div></div>';return html;
}

// ── FINANCIAL ──
function renderFinancial(){
  var db=getDB();
  var nowDate=today();
  var currentMonth=nowDate.slice(0,7); // 'YYYY-MM'

  // Helper: get the relevant date for a package (payment date or created date)
  function pkgMonth(p){
    var d=p.paymentDate||(p.createdAt?p.createdAt.split('T')[0]:null);
    return d?d.slice(0,7):'';
  }

  // Current month packages only - for top cards
  var paidNow=db.packages.filter(function(p){return p.paymentStatus==='paid'&&pkgMonth(p)===currentMonth;});
  var parcela1Now=db.packages.filter(function(p){return p.paymentStatus==='parcela1'&&pkgMonth(p)===currentMonth;});
  var pendingNow=db.packages.filter(function(p){return p.paymentStatus==='pending'&&pkgMonth(p)===currentMonth;});
  // Also include parcela1 from any month that still has 2nd installment pending
  var parcela1Any=db.packages.filter(function(p){return p.paymentStatus==='parcela1';});

  var paidRev=paidNow.reduce(function(a,p){return a+p.price;},0);
  var parcela1Rev=parcela1Now.reduce(function(a,p){return a+p.price/2;},0);
  var pendRev=pendingNow.reduce(function(a,p){return a+p.price;},0)+parcela1Now.reduce(function(a,p){return a+p.price/2;},0);

  // Revenue by month (all history)
  var revenueByMonth={};
  db.packages.filter(function(p){return p.paymentStatus==='paid';}).forEach(function(p){
    var d=p.paymentDate||(p.createdAt?p.createdAt.split('T')[0]:null);
    if(d){var mon=d.slice(0,7);if(!revenueByMonth[mon])revenueByMonth[mon]=0;revenueByMonth[mon]+=p.price;}
  });
  db.packages.filter(function(p){return p.paymentStatus==='parcela1';}).forEach(function(p){

var _billsCache=null;

async function loadBills(){
  var rows=await supaFetch('GET','bills',null,'?order=due_date&paid=eq.false');
  var paid=await supaFetch('GET','bills',null,'?order=due_date.desc&paid=eq.true&limit=20');
  _billsCache={pending:rows||[],paid:paid||[]};
  return _billsCache;
}

function billStatusInfo(bill){
  var now=today();
  var due=bill.due_date;
  var diff=Math.round((new Date(due+'T12:00:00')-new Date(now+'T12:00:00'))/(1000*60*60*24));
  if(diff<0) return {cls:'badge-red',label:'⚠️ Vencido '+Math.abs(diff)+'d',urgent:true};
  if(diff===0) return {cls:'badge-red',label:'🔴 Vence hoje',urgent:true};
  if(diff<=3) return {cls:'badge-parcial',label:'🟡 Vence em '+diff+'d',urgent:true};
  return {cls:'badge-yellow',label:'📅 Vence em '+diff+'d',urgent:false};
}

async function saveBill(id, existing){
  var desc=document.getElementById('bl-desc').value.trim();
  var amount=parseFloat(document.getElementById('bl-amount').value);
  var due=document.getElementById('bl-due').value;
  var fileInput=document.getElementById('bl-file');
  var err=document.getElementById('bl-error');
  if(!desc||!due||isNaN(amount)){err.textContent='Preencha todos os campos obrigatórios';err.style.display='flex';return;}
  var fileData=existing?existing.file_data:null;
  var fileName=existing?existing.file_name:null;
  var fileType=existing?existing.file_type:null;
  if(fileInput&&fileInput.files&&fileInput.files[0]){
    var file=fileInput.files[0];
    if(file.size>2*1024*1024){err.textContent='Arquivo muito grande. Máximo 2MB.';err.style.display='flex';return;}
    fileName=file.name;
    fileType=file.type;
    fileData=await new Promise(function(res){
      var r=new FileReader();
      r.onload=function(e){res(e.target.result.split(',')[1]);};
      r.readAsDataURL(file);
    });
  }
  closeModal();
  showToast('⏳ Salvando boleto...');
  var row={description:desc,amount:amount,due_date:due,file_data:fileData,file_name:fileName,file_type:fileType};
  if(id){
    await supaFetch('PATCH','bills',row,'?id=eq.'+id);
  } else {
    row.id=genId();row.paid=false;row.created_at=new Date().toISOString();
    await supaFetch('POST','bills',row);
  }
  showToast('✅ Boleto salvo!');
  renderBills();
}

window.viewBillFile=async function(id){
  var rows=await supaFetch('GET','bills',null,'?id=eq.'+id);
  if(!rows||!rows[0]||!rows[0].file_data){showToast('Nenhum arquivo anexado',true);return;}
  var b=rows[0];
  var mtype=b.file_type||'application/octet-stream';
  var url='data:'+mtype+';base64,'+b.file_data;
  if(mtype==='application/pdf'){
    var win=window.open();
    win.document.write('<iframe src="'+url+'" width="100%" height="100%" style="border:none"></iframe>');
  } else {
    var win2=window.open();
    win2.document.write('<img src="'+url+'" style="max-width:100%;"/>');
  }
};

      var res;

        res=await fetch(SUPA_URL+'/rest/v1/notes?id=eq.'+_noteId,{
          method:'PATCH',
          headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:JSON.stringify({content:content,updated_at:new Date().toISOString()})
        });
      } else {
        _noteId='note_admin';
        res=await fetch(SUPA_URL+'/rest/v1/notes',{
          method:'POST',
          headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
          body:JSON.stringify({id:'note_admin',user_id:'admin',content:content,updated_at:new Date().toISOString()})
        });
      }
      localStorage.setItem('dashboard_notes',content);
      if(status)status.textContent=res.ok?'✅ Salvo!':'⚠️ Erro: '+res.status;
    }catch(e){
      localStorage.setItem('dashboard_notes',content);
      if(status)status.textContent='✅ Salvo localmente';
    }
    setTimeout(function(){var s=document.getElementById('notes-status');if(s)s.textContent='';},3000);
  }

  function buildUI(content){
    var ta=document.createElement('textarea');
    ta.rows=18;
    ta.placeholder='Escreva seus lembretes aqui...';
    ta.style.cssText='width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;outline:none;line-height:1.8;box-sizing:border-box;display:block;';
    ta.value=content||'';
    var container=document.getElementById('notes-container');
    if(container){container.innerHTML='';container.appendChild(ta);}
    var btn=document.getElementById('save-notes-btn');
    if(btn)btn.onclick=function(){saveNotes(ta.value);};
  }

  // Try to load from Supabase using fixed ID 'note_admin'
  fetch(SUPA_URL+'/rest/v1/notes?id=eq.note_admin',{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  }).then(function(r){return r.json();}).then(function(rows){
    if(rows&&rows.length>0){
      _noteId='note_admin';
      buildUI(rows[0].content||'');
    } else {
      buildUI(localStorage.getItem('dashboard_notes')||'');
    }
  }).catch(function(){
    buildUI(localStorage.getItem('dashboard_notes')||'');
  });
}

function saveSettings(){
  var creds=getCreds();
  var name=document.getElementById('st-name').value.trim();
  var email=document.getElementById('st-email').value.trim();
  var current=document.getElementById('st-current').value;
  var np=document.getElementById('st-new').value;
  var nc=document.getElementById('st-confirm').value;
  var err=document.getElementById('st-error');var ok=document.getElementById('st-ok');
  err.style.display='none';ok.style.display='none';
  if(!name||!email){err.textContent='Nome e email obrigatórios';err.style.display='flex';return;}
  if(!current){err.textContent='Digite a senha atual';err.style.display='flex';return;}
  if(current!==creds.password){err.textContent='Senha atual incorreta';err.style.display='flex';return;}
  if(np&&np!==nc){err.textContent='Senhas não coincidem';err.style.display='flex';return;}
  if(np&&np.length<4){err.textContent='Mínimo 4 caracteres';err.style.display='flex';return;}
  creds.name=name;creds.email=email;if(np)creds.password=np;
  saveCreds(creds);document.getElementById('sidebar-user-name').textContent=name;
  ok.textContent='✅ Salvo!';ok.style.display='flex';
  document.getElementById('st-current').value='';document.getElementById('st-new').value='';document.getElementById('st-confirm').value='';
}




function resetAllData(){
  window._doReset=async function(){if(document.getElementById('reset-confirm').value!=='APAGAR'){showToast('Digite APAGAR para confirmar',true);return;}closeModal();await supaFetch('DELETE','sessions',null,'?id=neq.none');await supaFetch('DELETE','packages',null,'?id=neq.none');await supaFetch('DELETE','clients',null,'?id=neq.none');await loadFromSupabase();navigate('dashboard');showToast('Dados apagados');};
  showModal('Apagar Todos os Dados','<div class="alert alert-red">Isso apaga todos os clientes, pacotes e sessões.</div><p style="color:var(--text2);font-size:13px;margin:14px 0">Digite <strong style="color:var(--red)">APAGAR</strong> para confirmar:</p><input type="text" id="reset-confirm" placeholder="APAGAR"/><div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="window._doReset()">Apagar Tudo</button></div>');
}
// ── AUTO LOGIN ──
if(localStorage.getItem(AUTH_KEY)){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sidebar-user-name').textContent=getCreds().name;
  navigate('dashboard');
  setTimeout(function(){loadFromSupabase().then(function(){navigate('dashboard');}).catch(function(){});},200);
}
</script>

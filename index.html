<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestão do Consultório</title>
<!-- San Francisco (Apple) + fallback stack -->
<style>
:root {
  --bg: #0f1117;
  --bg2: #181c27;
  --bg3: #1e2333;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --text2: #9099b0;
  --text3: #5a6278;
  --green: #34d98a;
  --green-bg: rgba(52,217,138,0.10);
  --green-bg2: rgba(52,217,138,0.18);
  --red: #f06060;
  --red-bg: rgba(240,96,96,0.12);
  --yellow: #f5c842;
  --yellow-bg: rgba(245,200,66,0.12);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.12);
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 4px 32px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.01em;}
h1,h2,h3,h4{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;letter-spacing:-0.02em;font-weight:600;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:99px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{width:56px;height:56px;background:var(--green-bg2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;}
.login-logo h1{font-size:24px;font-weight:700;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;letter-spacing:-0.03em;line-height:1.2;}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px;}
.login-hint{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--text2);}
.login-hint strong{color:var(--green);}

/* LAYOUT */
#app{display:flex;min-height:100vh;}
.sidebar{width:230px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.25s;}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h2{font-size:15px;font-weight:700;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;letter-spacing:-0.02em;}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;}
.nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;letter-spacing:-0.01em;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--green-bg2);color:var(--green);}
.nav-item .ico{font-size:17px;width:22px;text-align:center;}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border);}
.main{margin-left:230px;flex:1;min-height:100vh;padding:28px 32px;}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.page-title{font-size:22px;font-weight:700;flex:1;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;letter-spacing:-0.03em;line-height:1.2;}

/* CARDS & GRID */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-icon{font-size:22px;margin-bottom:10px;}
.stat-val{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;font-size:30px;font-weight:700;line-height:1;letter-spacing:-0.04em;}
.stat-label{font-size:11.5px;color:var(--text2);margin-top:6px;letter-spacing:0.02em;font-weight:500;}
.stat-card.green{border-color:rgba(52,217,138,0.2);background:linear-gradient(135deg,var(--bg2) 60%,rgba(52,217,138,0.04));}
.stat-card.yellow{border-color:rgba(245,200,66,0.2);}
.stat-card.blue{border-color:rgba(96,165,250,0.2);}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:11px 16px;border-bottom:1px solid var(--border);}
td{padding:13px 16px;font-size:13.5px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.5;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.td-muted{color:var(--text2);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:0.01em;}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,200,66,0.25);}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,0.25);}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,0.25);}
.badge-agendada{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,0.25);}
.badge-realizada{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.badge-falta{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.badge-psico{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,0.25);}
.badge-reab{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,0.25);}
.badge-aval{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--green);color:#0a1a12;}
.btn-primary:hover{background:#3ee99a;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{background:#252b3b;}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.btn-danger:hover{background:rgba(240,96,96,0.2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-icon{padding:7px;border-radius:var(--radius-sm);background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;font-size:15px;transition:all 0.15s;}
.btn-icon:hover{background:#252b3b;color:var(--text);}

/* FORMS */
.form-group{margin-bottom:16px;}
label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-size:13.5px;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(52,217,138,0.1);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--bg3);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.15s ease;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:slideUp 0.2s ease;}
.modal-lg{max-width:700px;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:17px;font-weight:700;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;letter-spacing:-0.02em;}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;}
.modal-close:hover{background:var(--bg3);color:var(--text);}
.modal-body{padding:24px;}

/* PROGRESS BAR */
.progress-bar{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:99px;transition:width 0.4s ease;}
.progress-green{background:var(--green);}
.progress-yellow{background:var(--yellow);}
.progress-red{background:var(--red);}

/* MISC */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.client-avatar{width:54px;height:54px;border-radius:14px;background:var(--green-bg2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--green);flex-shrink:0;}
.package-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.package-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.alert{padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.alert-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,96,96,0.25);}
.alert-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,217,138,0.25);}
.alert-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,200,66,0.25);}
.empty{text-align:center;padding:52px 20px;color:var(--text2);}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:0.4;}
.search-input-wrap{position:relative;flex:1;}
.search-input-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}

/* ── CALENDAR ── */
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);}
.cal-toolbar-left{display:flex;align-items:center;gap:8px;}
.cal-toolbar-title{font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;font-size:20px;font-weight:700;min-width:200px;letter-spacing:-0.03em;}
.cal-view-btns{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;}
.cal-view-btn{padding:5px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all 0.15s;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;}
.cal-view-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 13px;cursor:pointer;font-size:15px;transition:background 0.15s;}
.cal-nav-btn:hover{background:#252b3b;}
.cal-today-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:6px 13px;cursor:pointer;font-size:12px;font-weight:600;transition:background 0.15s;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;}
.cal-today-btn:hover{background:#252b3b;}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.month-header{text-align:center;padding:12px 4px;font-size:11.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);}
.month-day{min-height:130px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;position:relative;}
.month-day:nth-child(7n){border-right:none;}
.month-day:hover{background:rgba(255,255,255,0.02);}
.month-day.other{opacity:0.35;}
.month-day.today{background:rgba(52,217,138,0.05);}
.month-day-num{font-size:13px;font-weight:600;color:var(--text2);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:6px;}
.month-day.today .month-day-num{background:var(--green);color:#0a1a12;font-weight:700;}
.cal-chip{border-radius:6px;padding:4px 8px;font-size:11.5px;font-weight:500;margin-bottom:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;transition:opacity 0.1s;letter-spacing:-0.01em;line-height:1.4;}
.cal-chip:hover{opacity:0.8;}
.cal-chip.psicoterapia{background:rgba(96,165,250,0.22);color:#93c5fd;border-left:2px solid var(--blue);}
.cal-chip.reabilitacao{background:rgba(167,139,250,0.22);color:#c4b5fd;border-left:2px solid var(--purple);}
.cal-chip.avaliacao{background:rgba(52,217,138,0.18);color:#6ee7b7;border-left:2px solid var(--green);}
.cal-chip.falta{background:rgba(240,96,96,0.18);color:#fca5a5;border-left:2px solid var(--red);text-decoration:line-through;}
.cal-chip.realizada{opacity:0.55;}
.cal-more{font-size:10px;color:var(--text3);padding:1px 6px;cursor:pointer;}
.cal-more:hover{color:var(--text2);}

/* Week grid */
.week-wrap{display:flex;overflow:hidden;}
.week-time-col{width:52px;flex-shrink:0;border-right:1px solid var(--border);}
.week-time-cell{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:11px;color:var(--text3);}
.week-days{flex:1;display:grid;}
.week-day-header{text-align:center;padding:14px 4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.week-day-header:last-child{border-right:none;}
.week-day-name{font-size:11.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;}
.week-day-num{font-size:20px;font-weight:300;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;color:var(--text);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:4px auto 0;letter-spacing:-0.02em;}
.week-day-header.today .week-day-num{background:var(--green);color:#0a1a12;}
.week-cell{height:64px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;cursor:pointer;position:relative;transition:background 0.1s;}
.week-cell:last-child{border-right:none;}
.week-cell:hover{background:rgba(255,255,255,0.02);}
.week-event{border-radius:6px;padding:4px 8px;font-size:11.5px;font-weight:500;cursor:pointer;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;line-height:1.4;}
.week-event.psicoterapia{background:rgba(96,165,250,0.25);color:#93c5fd;border-left:2px solid var(--blue);}
.week-event.reabilitacao{background:rgba(167,139,250,0.25);color:#c4b5fd;border-left:2px solid var(--purple);}
.week-event.avaliacao{background:rgba(52,217,138,0.2);color:#6ee7b7;border-left:2px solid var(--green);}
.week-event.falta{background:rgba(240,96,96,0.2);color:#fca5a5;border-left:2px solid var(--red);}
.week-event:hover{opacity:0.8;}

/* Day popup */
.day-sessions-list .ds-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.day-sessions-list .ds-item:last-child{border-bottom:none;}
.ds-bar{width:3px;height:36px;border-radius:99px;flex-shrink:0;}

/* MOBILE */
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;padding:16px;}
  .grid-4{grid-template-columns:1fr 1fr;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .hamburger{display:block;}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;display:none;}
  .sidebar-overlay.open{display:block;}
  .month-day{min-height:60px;}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeIn 0.2s ease;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🧠</div>
      <h1>Gestão do Consultório</h1>
      <p>Área restrita — faça seu login</p>
    </div>
    <div class="login-hint">
      Acesso padrão: <strong>admin@admin.com</strong> / <strong>1234</strong><br>
      <small style="font-size:11px;margin-top:4px;display:block;">Altere nas ⚙️ Configurações após entrar.</small>
    </div>
    <div id="login-error" class="alert alert-red" style="display:none">❌ Email ou senha incorretos</div>
    <div class="form-group"><label>Email</label><input type="email" id="login-email" value="admin@admin.com" placeholder="seu@email.com"/></div>
    <div class="form-group"><label>Senha</label><input type="password" id="login-pass" value="1234" placeholder="••••••"/></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="app" style="display:none">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h2>🧠 Consultório</h2><p id="sidebar-user-name">Profissional</p></div>
    <div class="nav">
      <button class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard"><span class="ico">📊</span> Dashboard</button>
      <button class="nav-item" onclick="navigate('clients')" data-page="clients"><span class="ico">👥</span> Clientes</button>
      <button class="nav-item" onclick="navigate('packages')" data-page="packages"><span class="ico">📦</span> Pacotes</button>
      <button class="nav-item" onclick="navigate('sessions')" data-page="sessions"><span class="ico">📋</span> Sessões</button>
      <button class="nav-item" onclick="navigate('agenda')" data-page="agenda"><span class="ico">🗓️</span> Agenda</button>
      <button class="nav-item" onclick="navigate('financial')" data-page="financial"><span class="ico">💰</span> Financeiro</button>
      <button class="nav-item" onclick="navigate('settings')" data-page="settings"><span class="ico">⚙️</span> Configurações</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;" onclick="exportBackup()">⬇️ Backup</button>
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:6px;" onclick="importBackup()">⬆️ Restaurar</button>
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;margin-top:6px;color:var(--red);" onclick="doLogout()">Sair</button>
    </div>
  </nav>
  <main class="main">
    <div class="topbar">
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <div class="page-title" id="page-title">Dashboard</div>
      <div id="topbar-actions"></div>
    </div>
    <div id="page-content"></div>
  </main>
</div>

<div id="modal-container"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="loadBackupFile(event)"/>

<script>
// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
const DB_KEY = 'consultorio_v2';
const AUTH_KEY = 'consultorio_auth';

function getDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return defaultDB();
    return JSON.parse(raw);
  } catch { return defaultDB(); }
}
function defaultDB() {
  return { clients:[], packages:[], sessions:[], credentials:{email:'admin@admin.com',password:'1234',name:'Profissional'} };
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }

// ═══════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const db = getDB();
  const err = document.getElementById('login-error');
  if (email === db.credentials.email && pass === db.credentials.password) {
    localStorage.setItem(AUTH_KEY,'1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sidebar-user-name').textContent=db.credentials.name;
    err.style.display='none';
    navigate('dashboard');
  } else { err.style.display='flex'; }
}
function doLogout() {
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if (localStorage.getItem(AUTH_KEY)) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sidebar-user-name').textContent=getDB().credentials.name;
  setTimeout(()=>navigate('dashboard'),10);
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
let currentPage='dashboard';
// Check if backup reminder needed
function checkBackupReminder(){
  const last=localStorage.getItem('last_backup_reminder');
  const now=Date.now();
  if(!last||now-parseInt(last)>7*24*60*60*1000){
    const db=getDB();
    if(db.clients.length>0){
      localStorage.setItem('last_backup_reminder',now.toString());
      setTimeout(()=>{
        const t=document.createElement('div');
        t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:14px 18px;border-radius:var(--radius);font-size:13px;z-index:999;animation:fadeIn 0.2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:280px;';
        t.innerHTML='<div style="font-weight:600;margin-bottom:6px">💾 Lembrete de Backup</div><div style="color:var(--text2);font-size:12px;margin-bottom:10px">Faça um backup dos seus dados para não perdê-los.</div><button onclick="exportBackup();this.parentElement.remove()" style="background:var(--green);color:#0a1a12;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">⬇️ Fazer backup agora</button><button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;position:absolute;top:10px;right:12px;line-height:1">×</button>';
        t.style.position='fixed';
        document.body.appendChild(t);
        setTimeout(()=>{if(t.parentElement)t.remove();},15000);
      },2000);
    }
  }
}

function navigate(page) {
  currentPage=page; closeSidebar();
  // Reset main padding
  const main=document.querySelector('.main');
  if(main) main.style.padding = page==='agenda' ? '20px 16px' : '28px 32px';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const titles={dashboard:'Dashboard',clients:'Clientes',packages:'Pacotes',sessions:'Sessões',agenda:'Agenda',financial:'Financeiro',settings:'Configurações'};
  document.getElementById('page-title').textContent=titles[page]||page;
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('page-content').innerHTML='';
  ({dashboard:renderDashboard,clients:renderClients,packages:renderPackages,sessions:renderSessions,agenda:renderAgenda,financial:renderFinancial,settings:renderSettings}[page]||(() => {}))();
}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtDateTime(d,t){return t?`${fmtDate(d)} às ${t}`:fmtDate(d);}
function getInitials(name){if(!name)return'?';return name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();}

function catColor(cat){
  if(!cat||cat==='psicoterapia')return'var(--blue)';
  if(cat==='reabilitacao')return'var(--purple)';
  if(cat==='avaliacao')return'var(--green)';
  return'var(--blue)';
}
function catBadgeClass(cat){
  if(!cat||cat==='psicoterapia')return'badge-psico';
  if(cat==='reabilitacao')return'badge-reab';
  if(cat==='avaliacao')return'badge-aval';
  return'badge-blue';
}
function catLabel(cat){
  if(!cat||cat==='psicoterapia')return'🔵 Psicoterapia';
  if(cat==='reabilitacao')return'🟣 Reabilitação';
  if(cat==='avaliacao')return'🟢 Avaliação';
  return cat||'—';
}
function catLabelShort(cat){
  if(!cat||cat==='psicoterapia')return'Psicoterapia';
  if(cat==='reabilitacao')return'Reabilitação';
  if(cat==='avaliacao')return'Avaliação';
  return cat||'—';
}
function statusBadge(s){
  if(s==='realizada'||s==='completed')return['badge-realizada','✅ Realizada'];
  if(s==='falta')return['badge-falta','❌ Falta'];
  return['badge-agendada','📅 Agendada'];
}

function pkgStats(pkg){
  const db=getDB();
  const used=db.sessions.filter(s=>s.packageId===pkg.id&&(s.status==='realizada'||s.status==='completed')).length;
  const total=db.sessions.filter(s=>s.packageId===pkg.id).length;
  return{used,remaining:pkg.totalSessions-used,totalRegistered:total,isExhausted:(pkg.totalSessions-used)<=0,canAdd:total<pkg.totalSessions,pct:Math.round((used/pkg.totalSessions)*100)};
}
function clientName(id){const c=getDB().clients.find(c=>c.id===id);return c?c.name:'—';}
function pkgName(id){const p=getDB().packages.find(p=>p.id===id);return p?p.name:'—';}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function showModal(title,bodyHTML,large=false){
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal ${large?'modal-lg':''}">
        <div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">${bodyHTML}</div>
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

// ═══════════════════════════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════════════════════════
function exportBackup(){
  const blob=new Blob([JSON.stringify(getDB(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`consultorio-backup-${today()}.json`;a.click();
}
function importBackup(){document.getElementById('import-file').click();}
function loadBackupFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.clients||!data.packages||!data.sessions)throw new Error();
      saveDB(data);navigate(currentPage);showToast('✅ Backup restaurado!');
    }catch{showToast('❌ Arquivo inválido',true);}
  };
  reader.readAsText(file);e.target.value='';
}
function showToast(msg,error=false){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:24px;right:24px;background:${error?'var(--red-bg)':'var(--green-bg2)'};border:1px solid ${error?'rgba(240,96,96,0.3)':'rgba(52,217,138,0.3)'};color:${error?'var(--red)':'var(--green)'};padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:999;animation:fadeIn 0.2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.4);`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard(){
  checkBackupReminder();
  const db=getDB();
  const totalClients=db.clients.length;
  const totalDone=db.sessions.filter(s=>s.status==='realizada'||s.status==='completed').length;
  const totalPending=db.sessions.filter(s=>s.status==='agendada').length;
  const totalFalta=db.sessions.filter(s=>s.status==='falta').length;
  const paidRev=db.packages.filter(p=>p.paymentStatus==='paid').reduce((a,p)=>a+p.price,0);
  const pendRev=db.packages.filter(p=>p.paymentStatus==='pending').reduce((a,p)=>a+p.price,0);
  const now=today();
  const in7=new Date();in7.setDate(in7.getDate()+7);
  const upcoming=db.sessions.filter(s=>s.status==='agendada'&&s.date>=now&&s.date<=in7.toISOString().split('T')[0]).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  const recent=[...db.sessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  document.getElementById('page-content').innerHTML=`<div class="page">
    <div class="grid-4">
      <div class="stat-card green"><div class="stat-icon">👥</div><div class="stat-val">${totalClients}</div><div class="stat-label">Clientes</div></div>
      <div class="stat-card blue"><div class="stat-icon">✅</div><div class="stat-val">${totalDone}</div><div class="stat-label">Sessões Realizadas</div></div>
      <div class="stat-card yellow"><div class="stat-icon">📅</div><div class="stat-val">${totalPending}</div><div class="stat-label">Agendadas</div></div>
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val" style="font-size:20px">${fmt(paidRev)}</div><div class="stat-label">Receita Confirmada</div></div>
    </div>
    ${pendRev>0?`<div class="alert alert-yellow" style="margin-bottom:20px">⚠️ <strong>${fmt(pendRev)}</strong> em pagamentos pendentes</div>`:''}
    ${totalFalta>0?`<div class="alert alert-red" style="margin-bottom:20px">❌ <strong>${totalFalta}</strong> falta${totalFalta!==1?'s':''} registrada${totalFalta!==1?'s':''}</div>`:''}
    <div class="grid-2">
      <div class="card">
        <div class="section-header"><div class="section-title">📅 Próximas 7 dias</div><button class="btn btn-ghost btn-sm" onclick="navigate('agenda')">Ver agenda →</button></div>
        ${upcoming.length===0?`<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><p>Nenhuma sessão nos próximos 7 dias</p></div>`
          :upcoming.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="width:3px;height:36px;border-radius:99px;background:${catColor(s.category)};flex-shrink:0"></div>
            <div style="flex:1"><div style="font-size:13.5px;font-weight:600">${clientName(s.clientId)}</div>
            <div style="font-size:12px;color:var(--text2)">${fmtDateTime(s.date,s.time)} · <span style="color:${catColor(s.category)}">${catLabelShort(s.category)}</span></div></div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="section-header"><div class="section-title">🕐 Sessões Recentes</div><button class="btn btn-ghost btn-sm" onclick="navigate('sessions')">Ver todas →</button></div>
        ${recent.length===0?`<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><p>Nenhuma sessão ainda</p></div>`
          :recent.map(s=>{const[bc,bl]=statusBadge(s.status);return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1"><div style="font-size:13.5px;font-weight:600">${clientName(s.clientId)}</div>
            <div style="font-size:12px;color:var(--text2)">${fmtDate(s.date)}</div></div>
            <span class="badge ${bc}">${bl}</span>
          </div>`;}).join('')}
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// CLIENTS
// ═══════════════════════════════════════════════════════════════
function renderClients(){
  const db=getDB();
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="showClientForm()">+ Novo Cliente</button>`;
  let search='';
  function render(){
    const filtered=db.clients.filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase())||(c.email||'').toLowerCase().includes(search.toLowerCase())||(c.phone||'').includes(search)).sort((a,b)=>a.name.localeCompare(b.name));
    document.getElementById('page-content').innerHTML=`<div class="page">
      <div style="display:flex;gap:10px;margin-bottom:18px">
        <div class="search-input-wrap"><span class="search-icon">🔍</span><input type="text" placeholder="Buscar cliente..." value="${search}" oninput="window._csearch(this.value)" style="padding-left:36px"/></div>
      </div>
      ${filtered.length===0?`<div class="card"><div class="empty"><div class="empty-icon">👥</div><p>Nenhum cliente encontrado</p></div></div>`
        :`<div class="card"><div class="table-wrap"><table>
          <thead><tr><th>Cliente</th><th>Telefone</th><th>Pacotes</th><th>Sessões</th><th>Ações</th></tr></thead>
          <tbody>${filtered.map(c=>{
            const pkgs=db.packages.filter(p=>p.clientId===c.id);
            const done=db.sessions.filter(s=>s.clientId===c.id&&(s.status==='realizada'||s.status==='completed')).length;
            return`<tr>
              <td><div style="display:flex;align-items:center;gap:10px">
                <div style="width:34px;height:34px;border-radius:9px;background:var(--green-bg2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0">${getInitials(c.name)}</div>
                <div><div style="font-weight:600">${c.name}</div>${c.email?`<div style="font-size:12px;color:var(--text2)">${c.email}</div>`:''}</div>
              </div></td>
              <td class="td-muted">${c.phone||'—'}</td>
              <td><span class="badge badge-blue">${pkgs.length} pacote${pkgs.length!==1?'s':''}</span></td>
              <td><span class="badge badge-green">${done} realizada${done!==1?'s':''}</span></td>
              <td><div style="display:flex;gap:6px">
                <button class="btn-icon" onclick="showClientDetail('${c.id}')">👁️</button>
                <button class="btn-icon" onclick="showSessionForm('${c.id}')">📝</button>
                <button class="btn-icon" onclick="showClientForm('${c.id}')">✏️</button>
                <button class="btn-icon" onclick="deleteClientConfirm('${c.id}')">🗑️</button>
              </div></td>
            </tr>`;
          }).join('')}</tbody></table></div></div>`}
    </div>`;
  }
  window._csearch=(v)=>{search=v;render();};
  render();
}

function showClientForm(id=null){
  const db=getDB();const c=id?db.clients.find(c=>c.id===id):null;
  showModal(id?'Editar Cliente':'Novo Cliente',`
    <div class="form-group"><label>Nome *</label><input type="text" id="cf-name" value="${c?.name||''}" placeholder="Nome completo"/></div>
    <div class="form-row">
      <div class="form-group"><label>Telefone</label><input type="tel" id="cf-phone" value="${c?.phone||''}" placeholder="(11) 99999-9999"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="cf-email" value="${c?.email||''}" placeholder="email@exemplo.com"/></div>
    </div>
    <div class="form-group"><label>Observações</label><textarea id="cf-notes" placeholder="Notas...">${c?.notes||''}</textarea></div>
    <div id="cf-error" class="alert alert-red" style="display:none"></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient('${id||''}')">Salvar</button>
    </div>`);
}

function saveClient(id){
  const name=document.getElementById('cf-name').value.trim();
  const err=document.getElementById('cf-error');
  if(!name){err.textContent='Nome é obrigatório';err.style.display='flex';return;}
  const db=getDB();
  const data={name,phone:document.getElementById('cf-phone').value.trim(),email:document.getElementById('cf-email').value.trim(),notes:document.getElementById('cf-notes').value.trim()};
  if(id){const idx=db.clients.findIndex(c=>c.id===id);db.clients[idx]={...db.clients[idx],...data};}
  else db.clients.push({id:genId(),createdAt:new Date().toISOString(),...data});
  saveDB(db);closeModal();renderClients();showToast(id?'✅ Cliente atualizado!':'✅ Cliente cadastrado!');
}

function deleteClientConfirm(id){
  const c=getDB().clients.find(c=>c.id===id);
  showModal('Excluir Cliente',`
    <div class="alert alert-red">⚠️ Isso irá excluir <strong>${c.name}</strong> e todos os seus dados.</div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="deleteClientDo('${id}')">Excluir</button>
    </div>`);
}
function deleteClientDo(id){
  const db=getDB();
  db.clients=db.clients.filter(c=>c.id!==id);
  db.packages=db.packages.filter(p=>p.clientId!==id);
  db.sessions=db.sessions.filter(s=>s.clientId!==id);
  saveDB(db);closeModal();renderClients();showToast('🗑️ Cliente excluído');
}

function showClientDetail(id){
  const db=getDB();const c=db.clients.find(c=>c.id===id);if(!c)return;
  const pkgs=db.packages.filter(p=>p.clientId===id);
  const sessions=db.sessions.filter(s=>s.clientId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const pkgsHTML=pkgs.length===0?`<div class="empty" style="padding:20px"><p>Nenhum pacote</p></div>`
    :pkgs.map(p=>{const st=pkgStats(p);const bc=st.pct>=100?'progress-red':st.pct>=70?'progress-yellow':'progress-green';
      return`<div class="package-card"><div class="package-header">
        <div><strong>${p.name}</strong>${st.isExhausted?'<span class="badge badge-red" style="margin-left:8px">Encerrado</span>':''}</div>
        <span class="badge ${p.paymentStatus==='paid'?'badge-green':'badge-yellow'}">${p.paymentStatus==='paid'?'💰 Pago':'⏳ Pendente'}</span>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text2)">Total: <strong style="color:var(--text)">${p.totalSessions}</strong></span>
        <span style="font-size:12px;color:var(--text2)">Realizadas: <strong style="color:var(--text)">${st.used}</strong></span>
        <span style="font-size:12px;color:var(--text2)">Restantes: <strong style="color:${st.remaining<=0?'var(--red)':st.remaining<=2?'var(--yellow)':'var(--green)'}">${st.remaining}</strong></span>
        <span style="font-size:12px;color:var(--text2)">Valor: <strong style="color:var(--text)">${fmt(p.price)}</strong></span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${bc}" style="width:${Math.min(st.pct,100)}%"></div></div>
    </div>`;}).join('');

  const sessHTML=sessions.length===0?`<div class="empty" style="padding:20px"><p>Nenhuma sessão</p></div>`
    :`<table style="width:100%;border-collapse:collapse">
      <thead><tr><th>Data</th><th>Hora</th><th>Categoria</th><th>Status</th><th></th></tr></thead>
      <tbody>${sessions.map(s=>{const[bc,bl]=statusBadge(s.status);return`<tr>
        <td>${fmtDate(s.date)}</td><td class="td-muted">${s.time||'—'}</td>
        <td><span class="badge ${catBadgeClass(s.category)}">${catLabelShort(s.category)}</span></td>
        <td><span class="badge ${bc}">${bl}</span></td>
        <td><div style="display:flex;gap:6px">
          <button class="btn-icon" onclick="closeModal();showSessionEditForm('${s.id}')">✏️</button>
          <button class="btn-icon" onclick="deleteSessionFromDetail('${s.id}','${id}')">🗑️</button>
        </div></td>
      </tr>`;}).join('')}</tbody></table>`;

  showModal(`Cliente: ${c.name}`,`
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="client-avatar">${getInitials(c.name)}</div>
      <div>${c.phone?`<div style="font-size:13px;color:var(--text2)">📱 ${c.phone}</div>`:''}${c.email?`<div style="font-size:13px;color:var(--text2)">✉️ ${c.email}</div>`:''}${c.notes?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${c.notes}</div>`:''}</div>
    </div>

function savePackage(id){
  const clientId=document.getElementById('pf-client').value;
  const name=document.getElementById('pf-name').value.trim();
  const totalSessions=parseInt(document.getElementById('pf-sessions').value);
  const price=parseFloat(document.getElementById('pf-price').value);
  const paymentStatus=document.getElementById('pf-payment').value;
  const err=document.getElementById('pf-error');
  if(!name||!totalSessions||isNaN(price)){err.textContent='Preencha todos os campos obrigatórios';err.style.display='flex';return;}
  if(totalSessions<1){err.textContent='Sessões deve ser maior que 0';err.style.display='flex';return;}
  // Validate first date for new packages
  if(!id){
    const fd=document.getElementById('pf-first-date')?.value;
    if(!fd){err.textContent='Informe a data da 1ª sessão para gerar o agendamento automático';err.style.display='flex';return;}
  }
  const db=getDB();
  if(id){
    const st=pkgStats(db.packages.find(p=>p.id===id));
    if(totalSessions<st.used){err.textContent=`Não pode reduzir abaixo de ${st.used} (já realizadas)`;err.style.display='flex';return;}
    const idx=db.packages.findIndex(p=>p.id===id);
    db.packages[idx]={...db.packages[idx],clientId,name,totalSessions,price,paymentStatus};
  } else {
    const newPkg={id:genId(),createdAt:new Date().toISOString(),clientId,name,totalSessions,price,paymentStatus};
    db.packages.push(newPkg);
    // Auto-generate sessions
    const firstDate=document.getElementById('pf-first-date')?.value;
    const time=document.getElementById('pf-time')?.value||'09:00';
    const interval=parseInt(document.getElementById('pf-interval')?.value||'7');
    const category=document.getElementById('pf-category')?.value||'psicoterapia';
    if(firstDate){
      for(let i=0;i<totalSessions;i++){
        const d=new Date(firstDate+'T12:00:00');
        d.setDate(d.getDate()+i*interval);
        db.sessions.push({id:genId(),createdAt:new Date().toISOString(),clientId,packageId:newPkg.id,date:d.toISOString().split('T')[0],time,status:'agendada',notes:'',category,intervalDays:interval});
      }
    }
  }
  saveDB(db);closeModal();renderPackages();showToast(id?'✅ Pacote atualizado!':`✅ Pacote criado com ${totalSessions} sessões!`);
}

function saveSessionEdit(id){
  const date=document.getElementById('se-date').value;
  const time=document.getElementById('se-time').value;
  const status=document.getElementById('se-status').value;
  const notes=document.getElementById('se-notes').value.trim();
  const category=document.getElementById('se-cat').value;
  const propagate=document.getElementById('se-propagate')?.checked||false;
  const err=document.getElementById('se-error');
  if(!date){err.textContent='Data é obrigatória';err.style.display='flex';return;}
  // Confirm falta
  const db0=getDB();const s0=db0.sessions.find(ss=>ss.id===id);
  if(status==='falta'&&s0&&s0.status!=='falta'){
    if(!window.confirm('Confirmar falta para esta sessão? Isso será registrado no histórico do paciente.')){return;}
  }
  const db=getDB();
  const s=db.sessions.find(ss=>ss.id===id);
  const oldDate=s.date;
  const idx=db.sessions.findIndex(ss=>ss.id===id);
  db.sessions[idx]={...db.sessions[idx],date,time,status,notes,category};
  if(propagate&&date!==oldDate){
    const diff=(new Date(date+'T12:00:00')-new Date(oldDate+'T12:00:00'))/(1000*60*60*24);
    db.sessions.filter(ss=>ss.packageId===s.packageId&&ss.date>oldDate&&ss.id!==id)
      .sort((a,b)=>a.date.localeCompare(b.date))
      .forEach(ss=>{
        const fi=db.sessions.findIndex(x=>x.id===ss.id);
        const nd=new Date(ss.date+'T12:00:00');nd.setDate(nd.getDate()+diff);
        db.sessions[fi].date=nd.toISOString().split('T')[0];
        db.sessions[fi].time=time;
      });
  }
  saveDB(db);closeModal();
  if(currentPage==='sessions')renderSessions();
  else if(currentPage==='agenda')renderCalendar();
  showToast(propagate?'✅ Sessão e futuras atualizadas!':'✅ Sessão atualizada!');
}

function renderCalendar(){
  const db=getDB();
  const todayStr=today();

  // Title
  let title='';
  if(calView==='month'){
    title=calDate.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    title=title.charAt(0).toUpperCase()+title.slice(1);
  } else {
    const mon=weekStart(calDate);
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);
    title=`${fmtDate(mon.toISOString().split('T')[0])} – ${fmtDate(sun.toISOString().split('T')[0])}`;
  }

  const html=`<div class="page" style="padding-bottom:20px">
    <div class="cal-wrap">
      <div class="cal-toolbar">
        <div class="cal-toolbar-left">
          <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
          <button class="cal-today-btn" onclick="calGoToday()">Hoje</button>
          <button class="cal-nav-btn" onclick="calNav(1)">›</button>
          <span class="cal-toolbar-title">${title}</span>
        </div>
        <div class="cal-view-btns">
          <button class="cal-view-btn ${calView==='month'?'active':''}" onclick="setCalView('month')">Mês</button>
          <button class="cal-view-btn ${calView==='week'?'active':''}" onclick="setCalView('week')">Semana</button>
        </div>
      </div>
      <div id="cal-body">
        ${calView==='month'?buildMonthGrid(db,todayStr):buildWeekGrid(db,todayStr)}
      </div>
    </div>
  </div>`;

  document.getElementById('page-content').innerHTML=html;
}

function weekStart(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function buildMonthGrid(db,todayStr){
  const year=calDate.getFullYear(),month=calDate.getMonth();
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  let startDow=first.getDay();startDow=startDow===0?6:startDow-1;
  const days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  let html=`<div class="month-grid">`;
  days.forEach(d=>html+=`<div class="month-header">${d}</div>`);
  // prev month
  for(let i=0;i<startDow;i++){
    const d=new Date(year,month,1-startDow+i);
    html+=buildMonthDay(d,db,todayStr,true);
  }
  // current
  for(let d=1;d<=last.getDate();d++)html+=buildMonthDay(new Date(year,month,d),db,todayStr,false);
  // next
  const total=startDow+last.getDate();
  const rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++)html+=buildMonthDay(new Date(year,month+1,i),db,todayStr,true);
  return html+'</div>';
}

function buildMonthDay(dt,db,todayStr,other){
  const ds=dt.toISOString().split('T')[0];
  const isToday=ds===todayStr;
  const sessions=db.sessions.filter(s=>s.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const show=sessions.slice(0,4);
  const extra=sessions.length-4;
  return`<div class="month-day ${other?'other':''} ${isToday?'today':''}" onclick="dayClick('${ds}')">
    <div class="month-day-num">${dt.getDate()}</div>
    ${show.map(s=>{
      const db=getDB();
      const pkg=db.packages.find(p=>p.id===s.packageId);
      const pkgSessions=pkg?db.sessions.filter(ss=>ss.packageId===s.packageId).sort((a,b)=>a.date.localeCompare(b.date)||((a.time||'').localeCompare(b.time||''))):[];
      const sessNum=pkgSessions.findIndex(ss=>ss.id===s.id)+1;
      const total=pkg?pkg.totalSessions:0;
      const nameParts=clientName(s.clientId).split(' ');
      const shortName=nameParts.length>=2?`${nameParts[0]} ${nameParts[1]}`:nameParts[0];
      const label=pkg?`${shortName} ${sessNum}/${total}`:`${shortName}`;
      return`<span class="cal-chip ${s.category||'psicoterapia'} ${s.status==='falta'?'falta':s.status==='realizada'?'realizada':''}" title="${clientName(s.clientId)} — Sessão ${sessNum}/${total}" onclick="event.stopPropagation();showSessionEditForm('${s.id}')">
        ${s.time?`<strong>${s.time.slice(0,5)}</strong> `:''}${label}
      </span>`;}).join('')}
    ${extra>0?`<div class="cal-more">+${extra} mais</div>`:''}
  </div>`;
}

function buildWeekGrid(db,todayStr){
  const mon=weekStart(calDate);
  const weekDays=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);weekDays.push(d);}
  const dayNames=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const hours=[];for(let h=7;h<=21;h++)hours.push(h);

  let html=`<div style="overflow-x:auto"><div style="min-width:600px">`;
  // Header row
  html+=`<div style="display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid var(--border)">`;
  html+=`<div style="border-right:1px solid var(--border)"></div>`;
  weekDays.forEach((d,i)=>{
    const ds=d.toISOString().split('T')[0];
    const isToday=ds===todayStr;
    html+=`<div class="week-day-header ${isToday?'today':''}">
      <div class="week-day-name">${dayNames[i]}</div>
      <div class="week-day-num">${d.getDate()}</div>
    </div>`;
  });
  html+=`</div>`;

  // Time rows
  html+=`<div class="week-wrap">`;
  html+=`<div class="week-time-col">`;
  hours.forEach(h=>html+=`<div class="week-time-cell">${h}:00</div>`);
  html+=`</div>`;

  html+=`<div class="week-days" style="grid-template-columns:repeat(7,1fr)">`;
  // Headers spacer
  weekDays.forEach((d,i)=>{
    const ds=d.toISOString().split('T')[0];
    html+=`<div style="grid-row:span ${hours.length}">`;
    hours.forEach(h=>{
      const hStr=String(h).padStart(2,'0');
      const sessions=db.sessions.filter(s=>s.date===ds&&(s.time||'').startsWith(hStr));
      html+=`<div class="week-cell" onclick="dayClick('${ds}')">
        ${sessions.map(s=>{
        const db2=getDB();
        const pkg2=db2.packages.find(p=>p.id===s.packageId);
        const pkgSess2=pkg2?db2.sessions.filter(ss=>ss.packageId===s.packageId).sort((a,b)=>a.date.localeCompare(b.date)||((a.time||'').localeCompare(b.time||''))):[];
        const n2=pkgSess2.findIndex(ss=>ss.id===s.id)+1;
        const t2=pkg2?pkg2.totalSessions:0;
        const np2=clientName(s.clientId).split(' ');
        const fn2=np2.length>=2?`${np2[0]} ${np2[1]}`:np2[0];
        const lbl2=pkg2?`${fn2} ${n2}/${t2}`:fn2;
        return`<span class="week-event ${s.category||'psicoterapia'} ${s.status==='falta'?'falta':''}" title="${clientName(s.clientId)} — Sessão ${n2}/${t2}" onclick="event.stopPropagation();showSessionEditForm('${s.id}')">${lbl2}</span>`;}).join('')}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div></div></div>`;
  return html;
}

window.setCalView=function(v){calView=v;renderCalendar();};
window.calNav=function(dir){
  if(calView==='month'){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);}
  else{calDate.setDate(calDate.getDate()+dir*7);}
  renderCalendar();
};
window.calGoToday=function(){calDate=new Date();renderCalendar();};
window.dayClick=function(dateStr){
  const db=getDB();
  const sessions=db.sessions.filter(s=>s.date===dateStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const sessHTML=sessions.length===0
    ?`<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><p>Nenhuma sessão neste dia</p></div>`
    :`<div class="day-sessions-list">${sessions.map(s=>{const[bc,bl]=statusBadge(s.status);return`
      <div class="ds-item">
        <div class="ds-bar" style="background:${catColor(s.category)}"></div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13.5px">${clientName(s.clientId)}</div>
          <div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center">
            <span class="badge ${catBadgeClass(s.category)}" style="font-size:10px">${catLabelShort(s.category)}</span>
            <span style="font-size:12px;color:var(--text2)">${s.time||''} · ${pkgName(s.packageId)}</span>
          </div>
        </div>
        <span class="badge ${bc}" style="flex-shrink:0">${bl}</span>
        <button class="btn-icon" title="Editar" onclick="closeModal();showSessionEditForm('${s.id}')">✏️</button>
      </div>`;}).join('')}</div>`;
  showModal(`📅 ${fmtDate(dateStr)}`,`
    ${sessHTML}
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:right">
      <button class="btn btn-primary btn-sm" onclick="closeModal();showSessionForm(null,'${dateStr}')">+ Agendar neste dia</button>
    </div>`);
};

// FINANCIAL
// ═══════════════════════════════════════════════════════════════
function renderFinancial(){
  const db=getDB();
  const paid=db.packages.filter(p=>p.paymentStatus==='paid');
  const pending=db.packages.filter(p=>p.paymentStatus==='pending');
  const paidRev=paid.reduce((a,p)=>a+p.price,0);
  const pendRev=pending.reduce((a,p)=>a+p.price,0);
  document.getElementById('page-content').innerHTML=`<div class="page">
    <div class="grid-3" style="margin-bottom:24px">
      <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-val">${fmt(paidRev)}</div><div class="stat-label">Receita Confirmada (${paid.length} pacote${paid.length!==1?'s':''})</div></div>
      <div class="stat-card yellow"><div class="stat-icon">⏳</div><div class="stat-val">${fmt(pendRev)}</div><div class="stat-label">A Receber (${pending.length} pacote${pending.length!==1?'s':''})</div></div>
      <div class="stat-card blue"><div class="stat-icon">📊</div><div class="stat-val">${fmt(paidRev+pendRev)}</div><div class="stat-label">Total em Carteira</div></div>
    </div>
    ${pending.length>0?`<div class="card" style="margin-bottom:20px">
      <div class="section-header"><div class="section-title">⏳ Pagamentos Pendentes</div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Cliente</th><th>Pacote</th><th>Valor</th><th>Ação</th></tr></thead>
        <tbody>${pending.map(p=>`<tr>
          <td><strong>${clientName(p.clientId)}</strong></td>
          <td class="td-muted">${p.name}</td>
          <td style="color:var(--yellow);font-weight:600">${fmt(p.price)}</td>
          <td><button class="btn btn-primary btn-sm" onclick="markPaid('${p.id}')">Marcar como pago</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`:''}
    <div class="card">
      <div class="section-header"><div class="section-title">✅ Pagamentos Confirmados</div></div>
      ${paid.length===0?`<div class="empty" style="padding:20px"><p>Nenhum pagamento confirmado</p></div>`
        :`<div class="table-wrap"><table>
          <thead><tr><th>Cliente</th><th>Pacote</th><th>Sessões</th><th>Valor</th><th>Ação</th></tr></thead>
          <tbody>${paid.map(p=>{const st=pkgStats(p);return`<tr>
            <td><strong>${clientName(p.clientId)}</strong></td>
            <td class="td-muted">${p.name}</td>
            <td class="td-muted">${st.used}/${p.totalSessions}</td>
            <td style="color:var(--green);font-weight:600">${fmt(p.price)}</td>
            <td><button class="btn btn-ghost btn-sm" onclick="markPending('${p.id}')">Reverter</button></td>
          </tr>`;}).join('')}</tbody>
        </table></div>`}
    </div>
  </div>`;
}
window.markPaid=function(id){const db=getDB();const i=db.packages.findIndex(p=>p.id===id);db.packages[i].paymentStatus='paid';saveDB(db);renderFinancial();showToast('✅ Pago!');};
window.markPending=function(id){const db=getDB();const i=db.packages.findIndex(p=>p.id===id);db.packages[i].paymentStatus='pending';saveDB(db);renderFinancial();showToast('↩️ Revertido');};

function renderSettings(){
  const db=getDB();
  document.getElementById('page-content').innerHTML=`<div class="page"><div class="grid-2">
    <div class="card">
      <div class="section-header"><div class="section-title">🔐 Alterar Acesso</div></div>
      <p style="color:var(--text2);font-size:13px;margin-bottom:18px">Altere seu nome, email e senha de login.</p>
      <div class="form-group"><label>Seu Nome</label><input type="text" id="st-name" value="${db.credentials.name}"/></div>
      <div class="form-group"><label>Email de Login</label><input type="email" id="st-email" value="${db.credentials.email}"/></div>
      <div class="form-group"><label>Senha Atual *</label><input type="password" id="st-current" placeholder="Digite a senha atual"/></div>
      <div class="form-group"><label>Nova Senha</label><input type="password" id="st-new" placeholder="Deixe em branco para manter"/></div>
      <div class="form-group"><label>Confirmar Nova Senha</label><input type="password" id="st-confirm" placeholder="Repita a nova senha"/></div>
      <div id="st-error" class="alert alert-red" style="display:none"></div>
      <div id="st-ok" class="alert alert-green" style="display:none"></div>
      <button class="btn btn-primary" onclick="saveSettings()">Salvar</button>
    </div>
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="section-header"><div class="section-title">💾 Backup</div></div>
        <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Faça backup para não perder dados. Para usar em outro dispositivo, exporte e importe o arquivo.</p>
        <button class="btn btn-secondary" style="width:100%;justify-content:center;margin-bottom:8px" onclick="exportBackup()">⬇️ Exportar Backup</button>
        <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="importBackup()">⬆️ Restaurar Backup</button>
      </div>
      <div class="card">
        <div class="section-header"><div class="section-title" style="color:var(--red)">⚠️ Zona de Risco</div></div>
        <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Apaga todos os dados permanentemente.</p>
        <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="resetAllData()">🗑️ Apagar Todos os Dados</button>
      </div>
    </div>
  </div></div>`;
}

function saveSettings(){
  const db=getDB();
  const name=document.getElementById('st-name').value.trim();
  const email=document.getElementById('st-email').value.trim();
  const current=document.getElementById('st-current').value;
  const np=document.getElementById('st-new').value;
  const nc=document.getElementById('st-confirm').value;
  const err=document.getElementById('st-error');const ok=document.getElementById('st-ok');
  err.style.display='none';ok.style.display='none';
  if(!name||!email){err.textContent='Nome e email obrigatórios';err.style.display='flex';return;}
  if(!current){err.textContent='Digite a senha atual';err.style.display='flex';return;}
  if(current!==db.credentials.password){err.textContent='Senha atual incorreta';err.style.display='flex';return;}
  if(np&&np!==nc){err.textContent='Senhas não coincidem';err.style.display='flex';return;}
  if(np&&np.length<4){err.textContent='Mínimo 4 caracteres';err.style.display='flex';return;}
  db.credentials.name=name;db.credentials.email=email;
  if(np)db.credentials.password=np;
  saveDB(db);document.getElementById('sidebar-user-name').textContent=name;
  ok.textContent='✅ Salvo!';ok.style.display='flex';
  document.getElementById('st-current').value='';document.getElementById('st-new').value='';document.getElementById('st-confirm').value='';
}

function resetAllData(){
  showModal('Apagar Todos os Dados',`
    <div class="alert alert-red">Isso apaga todos os clientes, pacotes e sessões.</div>
    <p style="color:var(--text2);font-size:13px;margin:14px 0">Digite <strong style="color:var(--red)">APAGAR</strong> para confirmar:</p>
    <input type="text" id="reset-confirm" placeholder="APAGAR"/>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doResetAll()">Apagar Tudo</button>
    </div>`);
}
function doResetAll(){
  if(document.getElementById('reset-confirm').value!=='APAGAR'){showToast('Digite APAGAR para confirmar',true);return;}
  const db=getDB();db.clients=[];db.packages=[];db.sessions=[];saveDB(db);closeModal();navigate('dashboard');showToast('Dados apagados');
}
</script>
